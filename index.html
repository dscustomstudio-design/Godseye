@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body,#map{height:100%;overflow:hidden;background:#000}

:root{
  --g:#00ff9d;--c:#00d4ff;--r:#ff3b3b;--a:#ffc000;--p:#b06fff;
  --panel:rgba(3,8,18,0.94);--border:rgba(0,200,255,0.15);
}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);
}

.panel{position:absolute;background:var(--panel);border:1px solid var(--border);border-radius:3px;font-family:'Share Tech Mono',monospace;color:var(--g);font-size:11px;}

#hud{top:10px;left:10px;width:360px;max-height:calc(100vh - 42px);display:flex;flex-direction:column;overflow:hidden;}

#hud-top{padding:9px 13px 7px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sys-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:4px;}
.sys-sub{font-size:9px;color:var(--c);letter-spacing:1px;margin-top:1px;}
.dot{width:7px;height:7px;border-radius:50%;background:#333;transition:background .3s;}
.dot.live{background:var(--g);animation:blink 1.4s infinite;}
.dot.fetching{background:var(--a);animation:blink .6s infinite;}
.dot.err{background:var(--r);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

#search-wrap{padding:7px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:5px;}
#search{flex:1;background:rgba(0,255,157,.05);border:1px solid rgba(0,255,157,.18);border-radius:3px;color:var(--g);font-family:inherit;font-size:11px;padding:5px 8px;outline:none;}
#search:focus{border-color:rgba(0,255,157,.5);}
#search::placeholder{color:rgba(0,255,157,.28);}
#date-range{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.18);border-radius:3px;color:var(--c);font-family:inherit;font-size:10px;padding:4px 6px;outline:none;cursor:pointer;}
#date-range option{background:#060e1a;}
#search-btn{padding:5px 10px;border-radius:3px;border:1px solid rgba(0,255,157,.4);background:rgba(0,255,157,.08);color:var(--g);font-family:inherit;font-size:10px;cursor:pointer;letter-spacing:1px;transition:background .15s,border-color .15s;white-space:nowrap;flex-shrink:0;}
#search-btn:hover{background:rgba(0,255,157,.18);border-color:rgba(0,255,157,.7);}
#search-btn:active{background:rgba(0,255,157,.28);}

#src-filters{display:flex;flex-wrap:wrap;gap:3px;padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.src-btn{padding:2px 6px;border-radius:2px;border:1px solid;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:.5px;font-weight:600;background:transparent;transition:opacity .15s;color:#fff;}
.src-btn.off{opacity:.22;}

#cat-filters{display:flex;flex-wrap:wrap;gap:3px;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cat-btn{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:2px;border:1px solid var(--border);cursor:pointer;font-family:inherit;font-size:9px;background:transparent;color:var(--c);transition:opacity .15s;}
.cat-btn.off{opacity:.22;}

#stats{display:flex;gap:10px;padding:4px 12px;border-bottom:1px solid var(--border);font-size:9px;color:rgba(0,255,157,.4);flex-shrink:0;flex-wrap:wrap;}
#stats span{color:var(--g);}

#event-list{overflow-y:auto;flex:1;}
#event-list::-webkit-scrollbar{width:2px;}
#event-list::-webkit-scrollbar-thumb{background:var(--border);}

.ev{display:flex;align-items:flex-start;gap:7px;padding:6px 11px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;}
.ev:hover{background:rgba(0,255,157,.04);}
.ev.sel{background:rgba(0,255,157,.07);border-left-color:var(--g);}
.ev.threat{border-left-color:var(--r);}
.ev.warn{border-left-color:var(--a);}
.ev .ico{font-size:14px;flex-shrink:0;margin-top:1px;}
.ev .body{flex:1;min-width:0;}
.ev .headline{color:#ddd;font-size:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ev .meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.ev .src-tag{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:600;}
.ev .loc{font-size:9px;color:var(--c);}
.ev .age{font-size:9px;color:rgba(0,255,157,.35);}
.ev .veh{font-size:10px;}
.ev .sbar{width:24px;flex-shrink:0;}
.ev .sbar-fill{height:3px;border-radius:1px;background:var(--g);margin-top:7px;}
.ev.threat .sbar-fill{background:var(--r);}
.ev.warn .sbar-fill{background:var(--a);}

#empty{padding:18px 12px;color:rgba(0,255,157,.28);font-size:11px;}
#loading-bar{height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);background-size:200% 100%;animation:sweep 1.2s linear infinite;display:none;}
@keyframes sweep{0%{background-position:200% 0}100%{background-position:-200% 0}}

#ticker{top:10px;right:10px;width:270px;max-height:calc(100vh - 42px);display:flex;flex-direction:column;overflow:hidden;}
#ticker-head{padding:7px 11px;border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--a);letter-spacing:2px;flex-shrink:0;}
#ticker-list{overflow-y:auto;flex:1;}
#ticker-list::-webkit-scrollbar{width:2px;}
#ticker-list::-webkit-scrollbar-thumb{background:var(--border);}
.tick{padding:5px 9px;border-bottom:1px solid rgba(0,200,255,.05);cursor:pointer;}
.tick:hover{background:rgba(0,200,255,.04);}
.tick .t-src{font-size:8px;font-weight:600;margin-bottom:2px;}
.tick .t-hl{font-size:9px;color:#bbb;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tick .t-age{font-size:8px;color:rgba(0,255,157,.28);margin-top:2px;}

#tooltip{position:fixed;background:rgba(2,7,16,.97);border:1px solid var(--c);border-radius:3px;padding:9px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--c);pointer-events:none;display:none;max-width:270px;line-height:1.8;z-index:9000;}
#tooltip strong{color:#fff;font-size:11px;display:block;margin-bottom:4px;}

#statusbar{position:absolute;bottom:0;left:0;right:0;height:22px;background:rgba(2,7,16,.92);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:16px;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,255,157,.35);}
#statusbar .sb-item span{color:var(--g);}
#clock{margin-left:auto;color:var(--a);}

#legend{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:12px;align-items:center;padding:5px 12px;background:rgba(3,8,18,.9);border:1px solid var(--border);border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,255,157,.45);white-space:nowrap;}
.leg{display:flex;align-items:center;gap:4px;}
.leg-dot{width:7px;height:7px;border-radius:50%;}
</style>

  breaking: /breaking|urgent|alert|developing|just in|just now/i,
};

const CAT_ICONS = {
  naval:'🚢', aviation:'✈️', military:'🪖', conflict:'⚔️',
  disaster:'🌊', politics:'🏛️', economy:'📈', breaking:'🔴', general:'📰'
};

function assignVehicle(cat, geoName) {
  const coastal = /sea|ocean|strait|gulf|bay|port|coast|mediterranean|atlantic|pacific|caribbean|red sea|persian|hormuz|aden|malacca/i;
  const isCoastal = coastal.test(geoName || '');
  if (cat==='naval')    return {icon:'🚢',type:'ship',  label:'Naval Vessel',       color:'#00d4ff'};
  if (cat==='aviation') return {icon:'✈️',type:'plane', label:'Aircraft',           color:'#b06fff'};
  if (cat==='military' && isCoastal) return Math.random()>0.4
    ? {icon:'🚢',type:'ship', label:'Warship',           color:'#ff3b3b'}
    : {icon:'✈️',type:'plane',label:'Military Aircraft', color:'#ff3b3b'};
  if (cat==='military') return Math.random()>0.5
    ? {icon:'🚛',type:'ground',label:'Ground Forces',    color:'#ff3b3b'}
    : {icon:'🪖',type:'ground',label:'Military Unit',    color:'#ffc000'};
  if (cat==='conflict' && isCoastal) return {icon:'🚢',type:'ship',label:'Patrol Vessel',color:'#ff3b3b'};
  if (cat==='conflict') return {icon:'🚛',type:'ground',label:'Armed Column',color:'#ff3b3b'};
  if (cat==='disaster') return {icon:'🚁',type:'helo', label:'Relief Ops',  color:'#ffc000'};
  return null;
}

let allEvents=[], entityMap={}, vehicleEnts=[];
let activeSrcs = new Set([...API_QUERIES.map(s=>s.id),...RSS_FEEDS.map(s=>s.id)]);
let activeCats = new Set(Object.keys(CAT_RX).concat(['general']));
let searchQ='', dayRange=30, selectedId=null;

const viewer = new Cesium.Viewer('map',{
  shouldAnimate:true,baseLayerPicker:false,navigationHelpButton:false,
  homeButton:false,geocoder:false,sceneModePicker:false,
  timeline:false,animation:false,fullscreenButton:false,
  infoBox:false,selectionIndicator:false,
});
viewer.scene.backgroundColor = Cesium.Color.BLACK;
try{viewer.scene.globe.baseColor=Cesium.Color.fromCssColorString('#04091a');}catch(e){}
viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(20,15,18500000),duration:0});

function isoFrom(d){const x=new Date();x.setDate(x.getDate()-d);return x.toISOString().split('T')[0];}

async function fetchNewsAPI(){
  const from=isoFrom(dayRange), results=[];
  const allDomains=API_QUERIES.map(q=>q.domains).join(',');
  const keywords=['war military conflict','disaster earthquake flood','politics election government','navy ship maritime','aircraft missile strike'];
  let apiOk=0;
  await Promise.allSettled(keywords.map(async kw=>{
    try{
      const url=`${NEWS_API}?q=${encodeURIComponent(kw)}&domains=${encodeURIComponent(allDomains)}&from=${from}&sortBy=publishedAt&pageSize=100&language=en&apiKey=${NEWS_API_KEY}`;
      const res=await fetch(url,{signal:AbortSignal.timeout(15000)});
      const json=await res.json();
      if(json.status==='ok'&&json.articles){
        apiOk++;
        json.articles.forEach(a=>{
          const srcDomain=(a.source?.name||'').toLowerCase();
          let srcMeta=API_QUERIES.find(q=>q.label.toLowerCase()===srcDomain)
                   ||API_QUERIES.find(q=>q.domains.split(',').some(d=>srcDomain.includes(d.split('.')[0])));
          if(!srcMeta)srcMeta={id:'AP',label:a.source?.name||'News',color:'#aaa'};
          results.push(parseNewsAPI(a,srcMeta));
        });
      }
    }catch(_){}
  }));
  document.getElementById('sb-api').textContent=apiOk>0?`OK (${results.length})`:'ERR';
  return results;
}

function parseNewsAPI(a,src){
  const text=((a.title||'')+' '+(a.description||'')+' '+(a.content||'')).replace(/<[^>]+>/g,'');
  const headline=(a.title||'').trim();
  const geo=detectGeo(text),cat=detectCat(text),sev=calcSev(text,cat);
  const ts=a.publishedAt?new Date(a.publishedAt).getTime():Date.now();
  const veh=geo?assignVehicle(cat,geo.name):null;
  return{id:uid(),src:src.id,srcLabel:src.label,srcColor:src.color,headline,text,geo,cat,sev,ts,link:a.url||'',veh};
}

async function fetchRSS(){
  const results=[];let rssOk=0;
  await Promise.allSettled(RSS_FEEDS.map(async src=>{
    try{
      const res=await fetch(`${RSS_PROXY}${encodeURIComponent(src.url)}&count=30`,{signal:AbortSignal.timeout(12000)});
      const json=await res.json();
      if(json.status==='ok'&&json.items){rssOk++;json.items.forEach(item=>results.push(parseRSS(item,src)));}
    }catch(_){}
  }));
  document.getElementById('sb-rss').textContent=`${rssOk}/${RSS_FEEDS.length}`;
  return results;
}

function parseRSS(item,src){
  const text=((item.title||'')+' '+(item.description||'')).replace(/<[^>]+>/g,'');
  const headline=(item.title||'').replace(/<[^>]+>/g,'').trim();
  const geo=detectGeo(text),cat=detectCat(text),sev=calcSev(text,cat);
  const ts=item.pubDate?new Date(item.pubDate).getTime():Date.now();
  const veh=geo?assignVehicle(cat,geo.name):null;
  return{id:uid(),src:src.id,srcLabel:src.label,srcColor:src.color,headline,text,geo,cat,sev,ts,link:item.link||'',veh};
}

function detectGeo(text){
  const lower=text.toLowerCase();
  const sorted=Object.entries(GEO).sort((a,b)=>b[0].length-a[0].length);
  for(const[name,coords]of sorted){if(lower.includes(name))return{name,lat:coords[0],lon:coords[1]};}
  return null;
}
function detectCat(text){for(const[cat,rx]of Object.entries(CAT_RX)){if(rx.test(text))return cat;}return'general';}
function calcSev(text,cat){
  let s=3;
  if(cat==='conflict'||cat==='military')s+=3;
  if(cat==='naval'||cat==='aviation')s+=2;
  if(cat==='disaster')s+=2;if(cat==='breaking')s+=2;
  if(/kill|dead|death|casualt|massacre|nuclear/i.test(text))s+=2;
  if(/hundreds|thousands|dozens/i.test(text))s+=1;
  return Math.min(s,10);
}

async function fetchAll(){
  setStatus('fetching');
  document.getElementById('loading-bar').style.display='block';
  const[apiRes,rssRes]=await Promise.allSettled([fetchNewsAPI(),fetchRSS()]);
  const combined=[
    ...(apiRes.status==='fulfilled'?apiRes.value:[]),
    ...(rssRes.status==='fulfilled'?rssRes.value:[]),
  ];
  const seen=new Set();
  allEvents=combined.filter(e=>{const k=e.headline.toLowerCase().slice(0,55);if(seen.has(k))return false;seen.add(k);return true;})
                    .sort((a,b)=>b.ts-a.ts);
  document.getElementById('sb-ref').textContent=new Date().toLocaleTimeString();
  document.getElementById('loading-bar').style.display='none';
  setStatus('live');
  renderMap();renderList();renderTicker();updateStats();
}

const SEV_COLOR={naval:'#b06fff',aviation:'#b06fff',military:'#ff3b3b',conflict:'#ff3b3b',disaster:'#ffc000',breaking:'#ffc000',politics:'#00d4ff',economy:'#00d4ff',general:'#00ff9d'};

function renderMap(){
  Object.values(entityMap).forEach(e=>viewer.entities.remove(e));entityMap={};
  vehicleEnts.forEach(e=>viewer.entities.remove(e));vehicleEnts=[];
  const visible=getFiltered();
  const groups={};
  visible.forEach(ev=>{
    if(!ev.geo)return;
    const key=`${Math.round(ev.geo.lat*2)/2},${Math.round(ev.geo.lon*2)/2}`;
    if(!groups[key])groups[key]=[];groups[key].push(ev);
  });
  Object.entries(groups).forEach(([key,evs])=>{
    const lead=evs.sort((a,b)=>b.sev-a.sev)[0];
    const col=SEV_COLOR[lead.cat]||'#00ff9d';
    const cc=Cesium.Color.fromCssColorString(col);
    const r=55000+lead.sev*28000+(evs.length-1)*12000;
    const sel=evs.some(e=>e.id===selectedId);
    const ent=viewer.entities.add({
      id:key,_evIds:evs.map(e=>e.id),
      position:Cesium.Cartesian3.fromDegrees(lead.geo.lon,lead.geo.lat),
      ellipse:{semiMajorAxis:r,semiMinorAxis:r,material:cc.withAlpha(sel?.32:.14),outline:true,outlineColor:cc.withAlpha(sel?.95:.5),outlineWidth:sel?2:1,height:0},
      point:{pixelSize:4+lead.sev*.7,color:cc,outlineColor:Cesium.Color.BLACK.withAlpha(.6),outlineWidth:1,disableDepthTestDistance:Number.POSITIVE_INFINITY},
      label:{text:`${CAT_ICONS[lead.cat]||'📰'} ${lead.geo.name.toUpperCase()}\n${evs.length} stor${evs.length>1?'ies':'y'}`,font:'10px "Share Tech Mono"',fillColor:cc,outlineColor:Cesium.Color.BLACK,outlineWidth:2,style:Cesium.LabelStyle.FILL_AND_OUTLINE,pixelOffset:new Cesium.Cartesian2(0,-22),showBackground:true,backgroundColor:new Cesium.Color(.01,.03,.08,.88),backgroundPadding:new Cesium.Cartesian2(5,3),disableDepthTestDistance:Number.POSITIVE_INFINITY,show:sel||evs.length>=2||lead.sev>=7},
    });
    entityMap[key]=ent;
  });
  visible.filter(e=>e.geo&&e.veh).sort((a,b)=>b.sev-a.sev).slice(0,60).forEach(ev=>{
    const v=ev.veh;
    const alt=v.type==='plane'?9000:v.type==='helo'?500:0;
    const jLat=ev.geo.lat+(Math.random()-.5)*1.5;
    const jLon=ev.geo.lon+(Math.random()-.5)*1.5;
    const ent=viewer.entities.add({
      id:'veh_'+ev.id,_evId:ev.id,_isVehicle:true,
      position:Cesium.Cartesian3.fromDegrees(jLon,jLat,alt),
      billboard:{image:makeVehicleCanvas(v.icon,v.color,ev.id===selectedId),width:34,height:34,verticalOrigin:Cesium.VerticalOrigin.BOTTOM,disableDepthTestDistance:Number.POSITIVE_INFINITY,heightReference:v.type==='plane'?Cesium.HeightReference.NONE:Cesium.HeightReference.CLAMP_TO_GROUND},
      label:{text:v.label,font:'9px "Share Tech Mono"',fillColor:Cesium.Color.fromCssColorString(v.color),outlineColor:Cesium.Color.BLACK,outlineWidth:2,style:Cesium.LabelStyle.FILL_AND_OUTLINE,pixelOffset:new Cesium.Cartesian2(0,-36),showBackground:true,backgroundColor:new Cesium.Color(.01,.03,.08,.85),backgroundPadding:new Cesium.Cartesian2(4,2),disableDepthTestDistance:Number.POSITIVE_INFINITY,show:ev.id===selectedId},
    });
    vehicleEnts.push(ent);
  });
  document.getElementById('ct-vehs').textContent=vehicleEnts.length;
}

function makeVehicleCanvas(icon,color,selected){
  const s=34,c=document.createElement('canvas');
  c.width=s;c.height=s;
  const ctx=c.getContext('2d');
  ctx.beginPath();ctx.arc(s/2,s/2,s/2-1,0,Math.PI*2);
  ctx.fillStyle=selected?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.6)';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=selected?2.5:1.5;ctx.stroke();
  ctx.font=`${s*.48}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icon,s/2,s/2+1);return c;
}

function renderList(){
  const filtered=getFiltered(),list=document.getElementById('event-list'),empty=document.getElementById('empty');
  if(!filtered.length){list.innerHTML='';empty.style.display='block';empty.textContent=allEvents.length?'No events match filters.':'Fetching intel…';return;}
  empty.style.display='none';
  const maxSev=Math.max(...filtered.map(e=>e.sev),1);
  list.innerHTML=filtered.slice(0,150).map(ev=>{
    const cls=ev.sev>=8?'threat':ev.sev>=6?'warn':'';
    const pct=Math.round((ev.sev/maxSev)*100);
    const icon=CAT_ICONS[ev.cat]||'📰';
    const sel=ev.id===selectedId?'sel':'';
    const date=new Date(ev.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const vStr=ev.veh?`<span class="veh" title="${ev.veh.label}">${ev.veh.icon}</span>`:'';
    return`<div class="ev ${cls} ${sel}" onclick="selectEvent('${ev.id}')">
      <span class="ico">${icon}</span>
      <div class="body">
        <div class="headline">${esc(ev.headline)}</div>
        <div class="meta">
          <span class="src-tag" style="background:${ev.srcColor}20;border:1px solid ${ev.srcColor}44;color:${ev.srcColor}">${ev.src}</span>
          ${ev.geo?`<span class="loc">📍${ev.geo.name}</span>`:''}
          ${vStr}
          <span class="age">${date}</span>
        </div>
      </div>
      <div class="sbar"><div class="sbar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderTicker(){
  document.getElementById('ticker-list').innerHTML=allEvents.slice(0,80).map(ev=>
    `<div class="tick" onclick="selectEvent('${ev.id}')">
      <div class="t-src" style="color:${ev.srcColor}">${ev.srcLabel} ${ev.veh?ev.veh.icon:''}</div>
      <div class="t-hl">${esc(ev.headline)}</div>
      <div class="t-age">${new Date(ev.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    </div>`).join('');
}

function getFiltered(){
  const q=searchQ.toLowerCase();
  const cut=Date.now()-dayRange*86400000;
  return allEvents.filter(ev=>{
    if(ev.ts<cut)return false;
    if(!activeSrcs.has(ev.src))return false;
    if(!activeCats.has(ev.cat))return false;
    if(q&&!ev.headline.toLowerCase().includes(q)&&!(ev.geo?.name||'').toLowerCase().includes(q)&&!ev.srcLabel.toLowerCase().includes(q)&&!ev.cat.toLowerCase().includes(q))return false;
    return true;
  });
}

function updateStats(){
  const f=getFiltered();
  document.getElementById('ct-events').textContent=f.length;
  document.getElementById('ct-srcs').textContent=new Set(f.map(e=>e.src)).size;
  document.getElementById('ct-locs').textContent=f.filter(e=>e.geo).length;
}

function setStatus(s){
  document.getElementById('status-dot').className='dot '+(s==='live'?'live':s==='fetching'?'fetching':'err');
  document.getElementById('status-txt').textContent=s.toUpperCase();
}

function uid(){return Math.random().toString(36).slice(2,10);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function selectEvent(id){
  const ev=allEvents.find(e=>e.id===id);if(!ev)return;
  selectedId=id===selectedId?null:id;
  if(selectedId&&ev.geo){
    viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(ev.geo.lon,ev.geo.lat,2800000),duration:1.6});
    vehicleEnts.forEach(e=>{e.label.show=e._evId===id;});
  }
  if(selectedId&&ev.link){
    setTimeout(()=>{if(confirm(`Open full article?\n\n${ev.headline}\n\nSource: ${ev.srcLabel}`))window.open(ev.link,'_blank');},500);
  }
  renderMap();renderList();updateStats();
}

function toggleSrc(id){
  activeSrcs.has(id)?activeSrcs.delete(id):activeSrcs.add(id);
  document.querySelectorAll('.src-btn').forEach(b=>b.classList.toggle('off',!activeSrcs.has(b.dataset.src)));
  renderMap();renderList();updateStats();
}
function toggleCat(id){
  activeCats.has(id)?activeCats.delete(id):activeCats.add(id);
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('off',!activeCats.has(b.dataset.cat)));
  renderMap();renderList();updateStats();
}

function runSearch(){
  searchQ=document.getElementById('search').value;
  renderMap();renderList();updateStats();
  const btn=document.getElementById('search-btn');
  btn.textContent='✓ DONE';
  btn.style.borderColor='rgba(0,255,157,.9)';
  btn.style.background='rgba(0,255,157,.22)';
  setTimeout(()=>{btn.textContent='⌕ RUN';btn.style.borderColor='';btn.style.background='';},1200);
}
document.getElementById('search').addEventListener('keydown',e=>{if(e.key==='Enter')runSearch();});
document.getElementById('date-range').addEventListener('change',e=>{dayRange=parseInt(e.target.value);renderMap();renderList();updateStats();});

const tip=document.getElementById('tooltip');
viewer.screenSpaceEventHandler.setInputAction(click=>{
  const picked=viewer.scene.pick(click.position);
  if(picked?.id?._evId)selectEvent(picked.id._evId);
  else if(picked?.id?._evIds?.length)selectEvent(allEvents.find(e=>e.id===picked.id._evIds[0])?.id);
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

viewer.screenSpaceEventHandler.setInputAction(move=>{
  const picked=viewer.scene.pick(move.endPosition);
  let html=null;
  if(picked?.id?._evId){
    const ev=allEvents.find(e=>e.id===picked.id._evId);
    if(ev)html=`<strong>${ev.veh?.icon||''} ${ev.veh?.label||'Track'}</strong><span style="color:${ev.srcColor}">[${ev.src}]</span> ${esc(ev.headline.slice(0,80))}${ev.headline.length>80?'…':''}${ev.geo?`<br>📍 ${ev.geo.name}`:''}`;
  }else if(picked?.id?._evIds){
    const evs=allEvents.filter(e=>picked.id._evIds.includes(e.id)).slice(0,5);
    if(evs.length)html=`<strong>📍 ${evs[0].geo?.name?.toUpperCase()||''} — ${evs.length} stories</strong>`+evs.map(e=>`<span style="color:${e.srcColor}">[${e.src}]</span> ${esc(e.headline.slice(0,55))}…`).join('<br>');
  }
  if(html){tip.innerHTML=html;tip.style.display='block';tip.style.left=(move.endPosition.x+14)+'px';tip.style.top=(move.endPosition.y-14)+'px';}
  else tip.style.display='none';
},Cesium.ScreenSpaceEventType.MOUSE_MOVE);

setInterval(()=>{document.getElementById('clock').textContent=new Date().toUTCString().replace('GMT','UTC');},1000);
document.getElementById('clock').textContent=new Date().toUTCString().replace('GMT','UTC');

fetchAll();
setInterval(fetchAll,10*60*1000);
</script>
</body>
