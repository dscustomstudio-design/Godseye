<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>God's Eye V14</title>
<script src="https://cdn.jsdelivr.net/npm/cesium@1.114.0/Build/Cesium/Cesium.js"></script>
<link href="https://cdn.jsdelivr.net/npm/cesium@1.114.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body,#cesiumContainer{width:100%;height:100%;overflow:hidden;background:#000}
:root{--g:#00ff9d;--c:#00d4ff;--r:#ff3b3b;--a:#ffc000;--p:#b06fff;--s:#fbbf24;
  --panel:rgba(2,6,14,0.95);--border:rgba(0,212,255,0.18);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:8888;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}
.panel{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:3px;
  font-family:'Share Tech Mono',monospace;color:var(--g);font-size:11px;}

/* ── LEFT HUD ── */
#hud{top:10px;left:10px;width:368px;max-height:calc(100vh - 44px);
  display:flex;flex-direction:column;overflow:hidden;z-index:100;
  transition:width .2s,max-height .2s;}

/* collapsed state — slim vertical bar */
#hud.collapsed{width:36px;max-height:calc(100vh - 44px);overflow:hidden;}
#hud.collapsed #hud-body{display:none;}
#hud.collapsed #hud-top .sys-title{display:none;}
#hud.collapsed #hud-top .sys-sub{display:none;}
#hud.collapsed #hud-top{padding:9px 0 9px;justify-content:center;flex-direction:column;gap:10px;height:100%;align-items:center;}
#hud.collapsed #collapse-btn{transform:rotate(180deg);}

#hud-top{padding:9px 13px 7px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sys-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:4px;}
.sys-sub{font-size:9px;color:var(--c);letter-spacing:1px;margin-top:1px;}

/* collapse button */
#collapse-btn{background:transparent;border:1px solid var(--border);border-radius:2px;
  color:var(--c);cursor:pointer;font-size:11px;padding:2px 5px;transition:transform .2s,background .15s;
  flex-shrink:0;line-height:1;}
#collapse-btn:hover{background:rgba(0,212,255,.15);}

.dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;}
.dot.live{background:var(--g);animation:blink 1.4s infinite;}
.dot.fetching{background:var(--a);animation:blink .5s infinite;}
.dot.err{background:var(--r);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* everything below the title bar collapses */
#hud-body{display:flex;flex-direction:column;overflow:hidden;flex:1;min-height:0;}

#search-wrap{padding:7px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:4px;}
#search{flex:1;background:rgba(0,255,157,.05);border:1px solid rgba(0,255,157,.18);border-radius:3px;
  color:var(--g);font-family:inherit;font-size:11px;padding:5px 8px;outline:none;}
#search:focus{border-color:rgba(0,255,157,.6);}
#search::placeholder{color:rgba(0,255,157,.3);}
#search-btn{padding:5px 9px;border-radius:3px;border:1px solid rgba(0,255,157,.5);
  background:rgba(0,255,157,.1);color:var(--g);font-family:inherit;font-size:10px;
  cursor:pointer;letter-spacing:1px;transition:background .15s;white-space:nowrap;}
#search-btn:hover{background:rgba(0,255,157,.25);}
#date-range{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:3px;
  color:var(--c);font-family:inherit;font-size:10px;padding:4px 5px;outline:none;cursor:pointer;}
#date-range option{background:#060e1a;}

#layer-bar{display:flex;flex-wrap:wrap;gap:3px;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.lyr-btn{padding:2px 7px;border-radius:2px;border:1px solid;cursor:pointer;font-family:inherit;
  font-size:9px;font-weight:600;background:transparent;transition:opacity .15s;}
.lyr-btn.off{opacity:.2;}

#src-filters{display:flex;flex-wrap:wrap;gap:3px;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.src-btn{padding:2px 6px;border-radius:2px;border:1px solid;cursor:pointer;font-family:inherit;
  font-size:9px;font-weight:600;background:transparent;transition:opacity .15s;color:#fff;}
.src-btn.off{opacity:.2;}

#cat-filters{display:flex;flex-wrap:wrap;gap:3px;padding:4px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cat-btn{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:2px;
  border:1px solid var(--border);cursor:pointer;font-family:inherit;font-size:9px;
  background:transparent;color:var(--c);transition:opacity .15s;}
.cat-btn.off{opacity:.2;}

#stats{display:flex;gap:6px;padding:4px 12px;border-bottom:1px solid var(--border);
  font-size:9px;color:rgba(0,255,157,.4);flex-shrink:0;flex-wrap:wrap;}
#stats span{color:var(--g);}

#lbar{height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);
  background-size:200%;animation:sweep 1s linear infinite;display:none;flex-shrink:0;}
@keyframes sweep{0%{background-position:200% 0}100%{background-position:-200% 0}}

#debug-toggle{width:100%;padding:3px 10px;background:rgba(0,212,255,.04);border:none;
  border-bottom:1px solid var(--border);color:var(--c);font-family:'Share Tech Mono',monospace;
  font-size:9px;cursor:pointer;text-align:left;flex-shrink:0;}
#debug-wrap{display:none;border-bottom:1px solid var(--border);flex-shrink:0;}
#debug-wrap.show{display:block;}
#debug-inner{padding:5px 10px;font-size:9px;max-height:80px;overflow-y:auto;line-height:1.6;}
#debug-inner .ok{color:#00ff9d;}#debug-inner .fail{color:#ff3b3b;}#debug-inner .warn{color:#ffc000;}

#event-list{overflow-y:auto;flex:1;}
#event-list::-webkit-scrollbar{width:2px;}
#event-list::-webkit-scrollbar-thumb{background:var(--border);}
.ev{display:flex;align-items:flex-start;gap:7px;padding:6px 11px;cursor:pointer;
  border-left:2px solid transparent;transition:background .1s;}
.ev:hover{background:rgba(0,255,157,.04);}
.ev.sel{background:rgba(0,255,157,.08);border-left-color:var(--g);}
.ev.threat{border-left-color:var(--r);}
.ev.warn{border-left-color:var(--a);}
.ev .ico{font-size:14px;flex-shrink:0;margin-top:1px;}
.ev .body{flex:1;min-width:0;}
.ev .headline{color:#ddd;font-size:10px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ev .meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.ev .src-tag{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:600;}
.ev .loc{font-size:9px;color:var(--c);}
.ev .age{font-size:9px;color:rgba(0,255,157,.35);}
.ev .sbar{width:22px;flex-shrink:0;}
.ev .sbar-fill{height:3px;border-radius:1px;background:var(--g);margin-top:7px;}
.ev.threat .sbar-fill{background:var(--r);}
.ev.warn .sbar-fill{background:var(--a);}
#empty{padding:18px 12px;color:rgba(0,255,157,.3);font-size:11px;line-height:1.7;}

/* ── RIGHT TICKER ── */
#ticker{top:10px;right:10px;width:262px;max-height:calc(100vh - 44px);
  display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:width .2s;}
#ticker.collapsed{width:36px;}
#ticker.collapsed #ticker-body{display:none;}
#ticker.collapsed #ticker-head{justify-content:center;padding:9px 0;flex-direction:column;gap:8px;height:100%;align-items:center;}
#ticker.collapsed #ticker-head span{display:none;}
#ticker.collapsed #ticker-tabs{display:none;}
#ticker.collapsed #ticker-collapse-btn{transform:rotate(180deg);}

#ticker-head{padding:7px 11px;border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:600;color:var(--a);letter-spacing:2px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;}
#ticker-collapse-btn{background:transparent;border:1px solid var(--border);border-radius:2px;
  color:var(--c);cursor:pointer;font-size:11px;padding:2px 5px;transition:transform .2s,background .15s;flex-shrink:0;}
#ticker-collapse-btn:hover{background:rgba(0,212,255,.15);}
#ticker-tabs{display:flex;gap:3px;}
.ttab{font-size:8px;padding:2px 5px;border-radius:2px;border:1px solid var(--border);
  cursor:pointer;font-family:'Share Tech Mono',monospace;color:rgba(0,255,157,.4);background:transparent;}
.ttab.on{color:var(--g);border-color:var(--g);background:rgba(0,255,157,.08);}
#ticker-body{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#ticker-list{overflow-y:auto;flex:1;}
#ticker-list::-webkit-scrollbar{width:2px;}
#ticker-list::-webkit-scrollbar-thumb{background:var(--border);}
.tick{padding:5px 9px;border-bottom:1px solid rgba(0,200,255,.05);cursor:pointer;}
.tick:hover{background:rgba(0,200,255,.04);}
.tick .t-src{font-size:8px;font-weight:600;margin-bottom:2px;}
.tick .t-hl{font-size:9px;color:#bbb;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tick .t-meta{font-size:8px;color:rgba(0,255,157,.28);margin-top:2px;}

/* ── WEATHER PANEL ── */
#wx-panel{bottom:32px;left:10px;width:228px;padding:8px 12px;font-size:9px;line-height:1.9;z-index:100;
  transition:left .2s;}
#wx-panel .wx-title{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--a);letter-spacing:1px;margin-bottom:4px;}
.wx-row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(0,200,255,.07);padding:1px 0;}
.wx-row span:last-child{color:#ddd;}

/* ── BADGE ── */
#badge-wrap{top:10px;left:50%;transform:translateX(-50%);
  padding:4px 14px;font-size:10px;letter-spacing:1px;z-index:100;
  display:flex;gap:14px;align-items:center;}
#flight-ct{color:var(--p);}
#sat-ct{color:var(--s);}

/* ── TOOLTIP ── */
#tooltip{position:fixed;background:rgba(1,5,12,.97);border:1px solid var(--c);border-radius:3px;
  padding:9px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--c);
  pointer-events:none;display:none;max-width:280px;line-height:1.8;z-index:9999;}
#tooltip strong{color:#fff;font-size:11px;display:block;margin-bottom:4px;}

/* ── STATUS BAR ── */
#statusbar{position:fixed;bottom:0;left:0;right:0;height:24px;background:rgba(1,5,12,.95);
  border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:14px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,255,157,.35);z-index:100;}
#statusbar .val{color:var(--g);}
#clock{margin-left:auto;color:var(--a);}

/* ── LEGEND ── */
#legend{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;align-items:center;padding:4px 12px;
  background:rgba(2,6,14,.92);border:1px solid var(--border);border-radius:3px;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(0,255,157,.45);white-space:nowrap;z-index:100;}
.leg{display:flex;align-items:center;gap:4px;}
.leg-dot{width:7px;height:7px;border-radius:50%;}
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<!-- LEFT HUD -->
<div class="panel" id="hud">
  <div id="hud-top">
    <div>
      <div class="sys-title">⬡ GOD'S EYE</div>
      <div class="sys-sub">LIVE GLOBAL INTEL — V14</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span id="status-txt" style="font-size:9px;color:rgba(0,255,157,.4)">INIT</span>
      <div class="dot" id="status-dot"></div>
      <button id="collapse-btn" onclick="toggleHUD()" title="Collapse panel">◀</button>
    </div>
  </div>

  <div id="hud-body">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search headlines, locations, callsigns…" autocomplete="off">
      <button id="search-btn" onclick="runSearch()">⌕ RUN</button>
      <select id="date-range">
        <option value="1">24h</option>
        <option value="3">3d</option>
        <option value="7">7d</option>
        <option value="14">14d</option>
        <option value="30" selected>30d</option>
      </select>
    </div>

    <div id="layer-bar">
      <button class="lyr-btn" id="lyr-news"    style="border-color:#00ff9d;color:#00ff9d" onclick="toggleLayer('news')">📰 NEWS</button>
      <button class="lyr-btn" id="lyr-flights" style="border-color:#b06fff;color:#b06fff" onclick="toggleLayer('flights')">✈️ FLIGHTS</button>
      <button class="lyr-btn" id="lyr-sats"    style="border-color:#fbbf24;color:#fbbf24" onclick="toggleLayer('sats')">🛰️ SATS</button>
      <button class="lyr-btn" id="lyr-weather" style="border-color:#ffc000;color:#ffc000" onclick="toggleLayer('weather')">🌩 ALERTS</button>
      <button class="lyr-btn" id="lyr-storms"  style="border-color:#ff6600;color:#ff6600" onclick="toggleLayer('storms')">🌀 STORMS</button>
    </div>

    <div id="src-filters">
      <button class="src-btn" data-src="BBC"       style="border-color:#bb1919;background:#bb191912" onclick="toggleSrc('BBC')">BBC</button>
      <button class="src-btn" data-src="CNN"       style="border-color:#cc0000;background:#cc000012" onclick="toggleSrc('CNN')">CNN</button>
      <button class="src-btn" data-src="FOX"       style="border-color:#2255bb;background:#2255bb12" onclick="toggleSrc('FOX')">FOX</button>
      <button class="src-btn" data-src="ALJAZ"     style="border-color:#009970;background:#00997012" onclick="toggleSrc('ALJAZ')">AL JAZ</button>
      <button class="src-btn" data-src="NBC"       style="border-color:#fa8c00;background:#fa8c0012" onclick="toggleSrc('NBC')">NBC</button>
      <button class="src-btn" data-src="REUTERS"   style="border-color:#ff6900;background:#ff690012" onclick="toggleSrc('REUTERS')">REUTERS</button>
      <button class="src-btn" data-src="AP"        style="border-color:#aaa;background:#aaa1"        onclick="toggleSrc('AP')">AP</button>
      <button class="src-btn" data-src="GUARDIAN"  style="border-color:#005689;background:#00568912" onclick="toggleSrc('GUARDIAN')">GUARDIAN</button>
      <button class="src-btn" data-src="NOAA"      style="border-color:#ffc000;background:#ffc00012" onclick="toggleSrc('NOAA')">NOAA</button>
      <button class="src-btn" data-src="OPENSKY"   style="border-color:#b06fff;background:#b06fff12" onclick="toggleSrc('OPENSKY')">OPENSKY</button>
      <button class="src-btn" data-src="CELESTRAK" style="border-color:#fbbf24;background:#fbbf2412" onclick="toggleSrc('CELESTRAK')">SATS</button>
    </div>

    <div id="cat-filters">
      <button class="cat-btn" data-cat="military"  onclick="toggleCat('military')">🪖 Military</button>
      <button class="cat-btn" data-cat="conflict"  onclick="toggleCat('conflict')">⚔️ Conflict</button>
      <button class="cat-btn" data-cat="naval"     onclick="toggleCat('naval')">🚢 Naval</button>
      <button class="cat-btn" data-cat="aviation"  onclick="toggleCat('aviation')">✈️ Aviation</button>
      <button class="cat-btn" data-cat="weather"   onclick="toggleCat('weather')">🌩 Weather</button>
      <button class="cat-btn" data-cat="disaster"  onclick="toggleCat('disaster')">🌊 Disaster</button>
      <button class="cat-btn" data-cat="politics"  onclick="toggleCat('politics')">🏛 Politics</button>
      <button class="cat-btn" data-cat="economy"   onclick="toggleCat('economy')">📈 Economy</button>
      <button class="cat-btn" data-cat="breaking"  onclick="toggleCat('breaking')">🔴 Breaking</button>
    </div>

    <div id="stats">
      <div>News: <span id="ct-news">0</span></div>
      <div>Flights: <span id="ct-flights">0</span></div>
      <div>Sats: <span id="ct-sats">0</span></div>
      <div>WX: <span id="ct-alerts">0</span></div>
      <div>Storms: <span id="ct-storms">0</span></div>
    </div>

    <button id="debug-toggle" onclick="toggleDebug()">▶ FEED DEBUG LOG</button>
    <div id="debug-wrap"><div id="debug-inner"></div></div>
    <div id="lbar"></div>
    <div id="event-list"><div id="empty">⟳ Initialising intel feeds…</div></div>
  </div>
</div>

<!-- RIGHT TICKER -->
<div class="panel" id="ticker">
  <div id="ticker-head">
    <span>📡 FEED</span>
    <div style="display:flex;align-items:center;gap:5px;">
      <div id="ticker-tabs">
        <button class="ttab on" onclick="switchTab('news')">NEWS</button>
        <button class="ttab"    onclick="switchTab('flights')">FLIGHTS</button>
        <button class="ttab"    onclick="switchTab('sats')">SATS</button>
        <button class="ttab"    onclick="switchTab('wx')">WX</button>
      </div>
      <button id="ticker-collapse-btn" onclick="toggleTicker()" title="Collapse ticker">▶</button>
    </div>
  </div>
  <div id="ticker-body">
    <div id="ticker-list"></div>
  </div>
</div>

<!-- BADGE -->
<div class="panel" id="badge-wrap">
  <span id="flight-ct">✈ <span id="live-flight-ct">0</span> AIRCRAFT</span>
  <span id="sat-ct">🛰️ <span id="live-sat-ct">0</span> SATS</span>
</div>

<!-- WEATHER -->
<div class="panel" id="wx-panel">
  <div class="wx-title">🌡 SURFACE CONDITIONS</div>
  <div id="wx-rows"><div style="color:rgba(0,255,157,.3)">Fetching NOAA…</div></div>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span>SYS: <span class="val">ONLINE</span></span>
  <span>NEWS: <span class="val" id="sb-news">–</span></span>
  <span>FLIGHTS: <span class="val" id="sb-flights">–</span></span>
  <span>SATS: <span class="val" id="sb-sats">–</span></span>
  <span>NOAA: <span class="val" id="sb-noaa">–</span></span>
  <span>UPDATED: <span class="val" id="sb-ref">–</span></span>
  <span id="clock">──</span>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#ff3b3b"></div>Conflict</div>
  <div class="leg"><div class="leg-dot" style="background:#ffc000"></div>WX Alert</div>
  <div class="leg"><div class="leg-dot" style="background:#ff6600"></div>Storm</div>
  <div class="leg"><div class="leg-dot" style="background:#b06fff"></div>Flight</div>
  <div class="leg"><div class="leg-dot" style="background:#fbbf24"></div>Satellite</div>
  <div class="leg"><div class="leg-dot" style="background:#00d4ff"></div>Politics</div>
  <div class="leg"><div class="leg-dot" style="background:#00ff9d"></div>General</div>
</div>

<script>
/* ══════════════════════════════════════════
   PROXY — Render Express server
══════════════════════════════════════════ */
const PROXY = u => `/proxy?url=${encodeURIComponent(u)}`;

/* ══════════════════════════════════════════
   CESIUM — dark CARTO tiles, no ion deps
══════════════════════════════════════════ */
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mMWZiLTQzYjYtYTQ0OS1kMWFjYmFkNjc4ZDkiLCJpZCI6NTc3MzMsImlhdCI6MTYyMzMxNzg3N30.EcK_1XusvHCBdHiMQFNnEItF1TxB8bvdPnFXmCr3EfI';

const viewer = new Cesium.Viewer('cesiumContainer', {
  imageryProvider: new Cesium.UrlTemplateImageryProvider({
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
    subdomains: ['a','b','c','d'],
    credit: '© OpenStreetMap contributors © CARTO',
    maximumLevel: 19,
  }),
  baseLayerPicker: false, navigationHelpButton: true,
  homeButton: true, geocoder: false, sceneModePicker: true,
  timeline: false, animation: false, fullscreenButton: false,
  infoBox: false, selectionIndicator: false, shouldAnimate: true,
  creditContainer: document.createElement('div'),
});
viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#020810');
viewer.scene.globe.enableLighting = false;
viewer.scene.globe.showGroundAtmosphere = false;
viewer.scene.skyBox.show = true;
viewer.scene.sun.show = false;
viewer.scene.moon.show = false;
viewer.scene.skyAtmosphere.show = false;
viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(15, 20, 19000000), duration: 0 });

/* ══════════════════════════════════════════
   RSS FEEDS
══════════════════════════════════════════ */
const RSS_FEEDS = [
  { id:'BBC',      label:'BBC World',    color:'#bb1919', url:'https://feeds.bbci.co.uk/news/world/rss.xml' },
  { id:'REUTERS',  label:'Reuters',      color:'#ff6900', url:'https://feeds.reuters.com/reuters/worldNews' },
  { id:'CNN',      label:'CNN World',    color:'#cc0000', url:'https://rss.cnn.com/rss/edition_world.rss' },

async function fetchRSS(){
  const results=[]; let ok=0;
  await Promise.allSettled(RSS_FEEDS.map(async src=>{
    try{
      log('warn',`Fetching ${src.label}…`);
      const res=await fetch(PROXY(src.url),{signal:AbortSignal.timeout(15000)});
      if(!res.ok){log('fail',`${src.label}: HTTP ${res.status}`);return;}
      const txt=await res.text();
      const doc=new DOMParser().parseFromString(txt,'text/xml');
      const items=[...doc.querySelectorAll('item')];
      if(!items.length){log('fail',`${src.label}: 0 items`);return;}
      ok++;
      log('ok',`${src.label}: ${items.length} items`);
      items.slice(0,30).forEach(el=>{
        const title=(el.querySelector('title')?.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim();
        const desc =(el.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,'').replace(/<!\[CDATA\[|\]\]>/g,'').slice(0,300);
        const link =el.querySelector('link')?.textContent?.trim()||'';
        const pub  =el.querySelector('pubDate')?.textContent||'';
        if(!title)return;
        const text=title+' '+desc;
        const geo=detectGeo(text),cat=detectCat(text),sev=calcSev(text,cat);
        const ts=pub?new Date(pub).getTime():Date.now();
        const veh=geo?assignVehicle(cat,geo.name):null;
        results.push({id:uid(),src:src.id,srcLabel:src.label,srcColor:src.color,headline:title,text,geo,cat,sev,ts,link,veh});
      });
    }catch(e){log('fail',`${src.label}: ${e.message}`);}
  }));
  document.getElementById('sb-news').textContent=`${ok}/${RSS_FEEDS.length} feeds`;
  return results;
}

    lon:s[5],lat:s[6],alt:Math.round((s[7]||s[13]||0)*3.281),
    speed:s[9]?Math.round(s[9]*1.944)+'kn':null,heading:s[10]?Math.round(s[10])+'°':null,

/* ══════════════════════════════════════════
   FETCH SATELLITES (CelesTrak TLE)
══════════════════════════════════════════ */
const CELESTRAK_SOURCES=[
  {name:'ISS',      color:'#00ff9d',url:'https://celestrak.org/SOCRATES/query.php?CATNR=25544&FORMAT=TLE',limit:1},
  {name:'Starlink', color:'#60a5fa',url:'https://celestrak.org/supplemental/sup-gp.php?FILE=starlink&FORMAT=tle',limit:60},
  {name:'Military', color:'#ff3b3b',url:'https://celestrak.org/SOCRATES/query.php?GROUP=military&FORMAT=TLE',limit:30},
  {name:'Weather',  color:'#ffc000',url:'https://celestrak.org/SOCRATES/query.php?GROUP=weather&FORMAT=TLE',limit:20},
  {name:'GPS',      color:'#a78bfa',url:'https://celestrak.org/SOCRATES/query.php?GROUP=gps-ops&FORMAT=TLE',limit:20},
];

function parseTLE(txt,name,color,limit){
  const lines=txt.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  const sats=[];
  for(let i=0;i<lines.length-1&&sats.length<limit;i++){
    const l1=lines[i],l2=lines[i+1];
    if(l1.startsWith('1 ')&&l2.startsWith('2 ')){
      try{const rec=satellite.twoline2satrec(l1,l2);sats.push({name,satrec:rec,color,group:name});i++;}catch(e){}
    }else if(i<lines.length-2){
      const l3=lines[i+2];
      if(l2.startsWith('1 ')&&l3.startsWith('2 ')){
        try{const rec=satellite.twoline2satrec(l2,l3);sats.push({name:l1||name,satrec:rec,color,group:name});i+=2;}catch(e){}
      }
    }
  }
  return sats;
}

function propagateSat(satrec,date){
  try{
    const pv=satellite.propagate(satrec,date);
    if(!pv.position)return null;
    const gmst=satellite.gstime(date);
    const geo=satellite.eciToGeodetic(pv.position,gmst);
    return{lat:satellite.degreesLat(geo.latitude),lon:satellite.degreesLong(geo.longitude),alt:Math.round(geo.height)};
  }catch(e){return null;}
}

function getOrbitTrack(satrec,steps=60,stepMin=1.5){
  const pts=[];const now=new Date();
  for(let i=0;i<steps;i++){
    const t=new Date(now.getTime()+i*stepMin*60000);
    const p=propagateSat(satrec,t);
    if(p)pts.push([p.lat,p.lon]);
  }
  // Split at antimeridian
  const segs=[];let seg=[];
  for(let i=0;i<pts.length;i++){
    if(i>0&&Math.abs(pts[i][1]-pts[i-1][1])>180){if(seg.length>1)segs.push(seg);seg=[];}
    seg.push(pts[i]);
  }
  if(seg.length>1)segs.push(seg);
  return segs;
}

async function fetchSatellites(){
  if(!window.satellite){log('warn','satellite.js not ready');return[];}
  log('warn','Fetching TLEs from CelesTrak…');
  const all=[];
  await Promise.allSettled(CELESTRAK_SOURCES.map(async src=>{
    try{
      const res=await fetch(PROXY(src.url),{signal:AbortSignal.timeout(15000)});
      if(!res.ok){log('fail',`TLE ${src.name}: HTTP ${res.status}`);return;}
      const txt=await res.text();
      if(!txt||txt.length<10){log('fail',`TLE ${src.name}: empty`);return;}
      const parsed=parseTLE(txt,src.name,src.color,src.limit);
      log('ok',`TLE ${src.name}: ${parsed.length} sats`);
      all.push(...parsed);
    }catch(e){log('fail',`TLE ${src.name}: ${e.message}`);}
  }));
  const now=new Date();
  const result=all.map(s=>{const p=propagateSat(s.satrec,now);return p?{...s,...p}:null;}).filter(Boolean);
  log('ok',`Satellites propagated: ${result.length}`);
  document.getElementById('ct-sats').textContent=result.length;
  document.getElementById('live-sat-ct').textContent=result.length;
  document.getElementById('sb-sats').textContent=result.length+' tracked';
  return result;
}

function updateSatPositions(){
  if(!liveSats.length||!window.satellite)return;
  const now=new Date();
  liveSats=liveSats.map(s=>{const p=propagateSat(s.satrec,now);return p?{...s,...p}:s;});
  renderSatellites();
}

async function fetchNOAAAlerts(){
  try{
    log('warn','Fetching NOAA alerts…');
    const res=await fetch(PROXY('https://api.weather.gov/alerts/active?status=actual&urgency=Immediate,Expected'),{signal:AbortSignal.timeout(14000)});
    if(!res.ok){log('fail',`NOAA: HTTP ${res.status}`);return[];}
    const json=await res.json();
    if(!json.features){log('fail','NOAA: no features');return[];}
    const alerts=json.features.slice(0,100).map(f=>{
      const p=f.properties;
      let lat=null,lon=null;
      const coords=f.geometry?.coordinates;
      if(coords){const flat=coords.flat(10).filter(x=>typeof x==='number');if(flat.length>=2){lon=flat[0];lat=flat[1];}}
      if(!lat){const g=detectGeo(p.areaDesc||'');if(g){lat=g.lat;lon=g.lon;}}
      return{id:'wx_'+uid(),event:p.event||'Alert',headline:(p.headline||p.event||'NOAA Alert').slice(0,120),severity:p.severity||'Unknown',urgency:p.urgency||'',area:(p.areaDesc||'').slice(0,60),lat,lon,ts:Date.now()};
    }).filter(a=>a.lat&&a.lon);
    log('ok',`NOAA alerts: ${alerts.length}`);
    return alerts;
  }catch(e){log('fail','NOAA: '+e.message);return[];}
}

async function fetchNOAAStorms(){
  const all=[];
  for(const feed of['https://www.nhc.noaa.gov/nhc_at1.xml','https://www.nhc.noaa.gov/nhc_ep1.xml']){
    try{
      const res=await fetch(PROXY(feed),{signal:AbortSignal.timeout(12000)});
      if(!res.ok)continue;
      const txt=await res.text();
      const doc=new DOMParser().parseFromString(txt,'text/xml');
      [...doc.querySelectorAll('item')].forEach(el=>{
        const title=el.querySelector('title')?.textContent||'';
        const desc=el.querySelector('description')?.textContent||'';
        const m=desc.match(/(\d+\.?\d*)\s*(N|S)[,\s]+(\d+\.?\d*)\s*(W|E)/i);
        if(m){
          const lat=parseFloat(m[1])*(m[2].toUpperCase()==='S'?-1:1);
          const lon=parseFloat(m[3])*(m[4].toUpperCase()==='W'?-1:1);
          all.push({id:'st_'+uid(),title,desc:desc.replace(/<[^>]+>/g,'').slice(0,200),lat,lon});
        }
      });
    }catch(e){}
  }
  log(all.length?'ok':'warn',`NHC storms: ${all.length}`);
  return all;
}

  log('warn','=== Starting full fetch ===');
  const[rssR,flightR,satR,alertR,stormR]=await Promise.allSettled([
    fetchRSS(),fetchFlights(),fetchSatellites(),fetchNOAAAlerts(),fetchNOAAStorms()
  ]);
  fetchNOAAConditions();

  const raw=rssR.status==='fulfilled'?rssR.value:[];
  const seen=new Set();
  allEvents=raw.filter(e=>{const k=e.headline.toLowerCase().slice(0,55);if(seen.has(k))return false;seen.add(k);return true;}).sort((a,b)=>b.ts-a.ts);
  liveFlights=flightR.status==='fulfilled'?flightR.value:[];
  liveSats=satR.status==='fulfilled'?satR.value:[];
  wxAlerts=alertR.status==='fulfilled'?alertR.value:[];
  storms=stormR.status==='fulfilled'?stormR.value:[];

  document.getElementById('ct-news').textContent=allEvents.length;
  document.getElementById('ct-alerts').textContent=wxAlerts.length;
  document.getElementById('ct-storms').textContent=storms.length;
  document.getElementById('sb-noaa').textContent=wxAlerts.length+' alerts';
  document.getElementById('sb-ref').textContent=new Date().toLocaleTimeString();
  document.getElementById('lbar').style.display='none';
  log('ok',`Done — ${allEvents.length} news, ${liveFlights.length} flights, ${liveSats.length} sats, ${wxAlerts.length} wx`);
  setStatus(allEvents.length||liveFlights.length||liveSats.length?'live':'err');

  renderNewsMap();renderFlights();renderSatellites();renderWeather();renderList();renderTicker();
}

/* ══════════════════════════════════════════
   RENDER — NEWS CLUSTERS
══════════════════════════════════════════ */
function renderNewsMap(){
  Object.values(newsEnts).forEach(e=>viewer.entities.remove(e));newsEnts={};
  vehicleEnts.forEach(e=>viewer.entities.remove(e));vehicleEnts=[];
  if(!layers.news)return;

  const visible=getFiltered();
  const groups={};
  visible.forEach(ev=>{
    if(!ev.geo)return;
    const key=`${Math.round(ev.geo.lat*2)/2},${Math.round(ev.geo.lon*2)/2}`;
    if(!groups[key])groups[key]=[];groups[key].push(ev);
  });

  Object.entries(groups).forEach(([key,evs])=>{
    const lead=evs.sort((a,b)=>b.sev-a.sev)[0];
    const col=SEV_COLOR[lead.cat]||'#00ff9d';
    const cc=Cesium.Color.fromCssColorString(col);
    const r=55000+lead.sev*28000+(evs.length-1)*12000;
    const sel=evs.some(e=>e.id===selectedId);
    newsEnts[key]=viewer.entities.add({
      id:key,_evIds:evs.map(e=>e.id),
      position:Cesium.Cartesian3.fromDegrees(lead.geo.lon,lead.geo.lat),
      ellipse:{semiMajorAxis:r,semiMinorAxis:r,material:cc.withAlpha(sel?.3:.12),
        outline:true,outlineColor:cc.withAlpha(sel?.9:.45),outlineWidth:sel?2:1,height:0},
      point:{pixelSize:4+lead.sev*.7,color:cc,outlineColor:Cesium.Color.BLACK.withAlpha(.6),
        outlineWidth:1,disableDepthTestDistance:Number.POSITIVE_INFINITY},
      label:{text:`${CAT_ICONS[lead.cat]||'📰'} ${lead.geo.name.toUpperCase()}\n${evs.length} stor${evs.length>1?'ies':'y'}`,
        font:'10px "Share Tech Mono"',fillColor:cc,outlineColor:Cesium.Color.BLACK,outlineWidth:2,
        style:Cesium.LabelStyle.FILL_AND_OUTLINE,pixelOffset:new Cesium.Cartesian2(0,-22),
        showBackground:true,backgroundColor:new Cesium.Color(.01,.03,.08,.88),
        backgroundPadding:new Cesium.Cartesian2(5,3),
        disableDepthTestDistance:Number.POSITIVE_INFINITY,show:sel||evs.length>=2||lead.sev>=7},
    });
  });

  visible.filter(e=>e.geo&&e.veh).sort((a,b)=>b.sev-a.sev).slice(0,50).forEach(ev=>{
    const v=ev.veh;
    const alt=v.icon==='✈️'?9000:v.icon==='🚁'?300:0;
    const jLat=ev.geo.lat+(Math.random()-.5)*1.2;
    const jLon=ev.geo.lon+(Math.random()-.5)*1.2;
    const ent=viewer.entities.add({
      id:'nv_'+ev.id,_evId:ev.id,
      position:Cesium.Cartesian3.fromDegrees(jLon,jLat,alt),
      billboard:{image:makePinCanvas(v.icon,v.color,ev.id===selectedId),
        width:30,height:30,verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,
        heightReference:alt>0?Cesium.HeightReference.NONE:Cesium.HeightReference.CLAMP_TO_GROUND},
      label:{text:v.label,font:'9px "Share Tech Mono"',fillColor:Cesium.Color.fromCssColorString(v.color),
        outlineColor:Cesium.Color.BLACK,outlineWidth:2,style:Cesium.LabelStyle.FILL_AND_OUTLINE,
        pixelOffset:new Cesium.Cartesian2(0,-33),showBackground:true,
        backgroundColor:new Cesium.Color(.01,.03,.08,.85),backgroundPadding:new Cesium.Cartesian2(4,2),
        disableDepthTestDistance:Number.POSITIVE_INFINITY,show:ev.id===selectedId},
    });
    vehicleEnts.push(ent);
  });
}

/* ══════════════════════════════════════════
   RENDER — LIVE FLIGHTS
══════════════════════════════════════════ */
function renderFlights(){
  flightEnts.forEach(e=>viewer.entities.remove(e));flightEnts=[];
  if(!layers.flights||!activeSrcs.has('OPENSKY'))return;
  liveFlights.forEach(f=>{
    const altM=Math.max((f.alt||0)/3.281,100);
    flightEnts.push(viewer.entities.add({
      id:'fl_'+f.icao+'_'+uid(),_flight:f,_isFlight:true,
      position:Cesium.Cartesian3.fromDegrees(f.lon,f.lat,altM),
      billboard:{image:makePinCanvas('✈️','#b06fff',false),
        width:18,height:18,verticalOrigin:Cesium.VerticalOrigin.CENTER,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,heightReference:Cesium.HeightReference.NONE},
    }));
  });
}

/* ══════════════════════════════════════════
   RENDER — SATELLITES + ORBITAL TRACKS
══════════════════════════════════════════ */
function renderSatellites(){
  satEnts.forEach(e=>viewer.entities.remove(e));satEnts=[];
  if(!layers.sats||!activeSrcs.has('CELESTRAK'))return;

  liveSats.forEach(s=>{
    const altM=(s.alt||400)*1000; // km to m

    // Satellite icon
    satEnts.push(viewer.entities.add({
      id:'sat_'+uid(),_sat:s,_isSat:true,
      position:Cesium.Cartesian3.fromDegrees(s.lon,s.lat,altM),
      billboard:{image:makePinCanvas('🛰️',s.color,false),
        width:20,height:20,verticalOrigin:Cesium.VerticalOrigin.CENTER,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,heightReference:Cesium.HeightReference.NONE},
    }));

    // Orbital track polyline
    const segs=getOrbitTrack(s.satrec,60,1.5);
    segs.forEach((seg,i)=>{
      if(seg.length<2)return;
      const positions=seg.map(p=>Cesium.Cartesian3.fromDegrees(p[1],p[0],altM));
      satEnts.push(viewer.entities.add({
        polyline:{
          positions,
          width:i===0?1.5:0.8,
          material:new Cesium.PolylineDashMaterialProperty({
            color:Cesium.Color.fromCssColorString(s.color).withAlpha(i===0?.6:.25),
            dashLength:12,
          }),
          clampToGround:false,
        },
      }));
    });
  });
}

/* ══════════════════════════════════════════
   RENDER — NOAA WEATHER
══════════════════════════════════════════ */
function renderWeather(){
  weatherEnts.forEach(e=>viewer.entities.remove(e));weatherEnts=[];

  if(layers.weather&&activeSrcs.has('NOAA')){
    wxAlerts.forEach(a=>{
      if(!a.lat||!a.lon)return;
      const sev=a.severity==='Extreme'?10:a.severity==='Severe'?8:a.severity==='Moderate'?6:4;
      const col=Cesium.Color.fromCssColorString(sev>=8?'#ff3b3b':'#ffc000');
      weatherEnts.push(viewer.entities.add({
        id:'wa_'+a.id,_alert:a,_isAlert:true,
        position:Cesium.Cartesian3.fromDegrees(a.lon,a.lat),
        ellipse:{semiMajorAxis:80000+sev*15000,semiMinorAxis:80000+sev*15000,
          material:col.withAlpha(.18),outline:true,outlineColor:col.withAlpha(.6),outlineWidth:1,height:0},
        point:{pixelSize:7,color:col,outlineColor:Cesium.Color.BLACK.withAlpha(.5),
          outlineWidth:1,disableDepthTestDistance:Number.POSITIVE_INFINITY},
        label:{text:`⚠️ ${(a.event||'').slice(0,22)}`,font:'9px "Share Tech Mono"',fillColor:col,
          outlineColor:Cesium.Color.BLACK,outlineWidth:2,style:Cesium.LabelStyle.FILL_AND_OUTLINE,
          pixelOffset:new Cesium.Cartesian2(0,-16),showBackground:true,
          backgroundColor:new Cesium.Color(.05,.02,.02,.9),backgroundPadding:new Cesium.Cartesian2(4,2),
          disableDepthTestDistance:Number.POSITIVE_INFINITY,show:true},
      }));
    });
  }

  if(layers.storms&&activeSrcs.has('NOAA')){
    storms.forEach(s=>{
      if(!s.lat||!s.lon)return;
      const col=Cesium.Color.fromCssColorString('#ff6600');
      weatherEnts.push(viewer.entities.add({
        id:'st_'+s.id,_storm:s,_isStorm:true,
        position:Cesium.Cartesian3.fromDegrees(s.lon,s.lat),
        ellipse:{semiMajorAxis:350000,semiMinorAxis:350000,
          material:col.withAlpha(.15),outline:true,outlineColor:col.withAlpha(.75),outlineWidth:2,height:0},
        point:{pixelSize:11,color:col,outlineColor:Cesium.Color.WHITE.withAlpha(.4),
          outlineWidth:2,disableDepthTestDistance:Number.POSITIVE_INFINITY},
        label:{text:`🌀 ${s.title.slice(0,28)}`,font:'10px "Share Tech Mono"',fillColor:col,
          outlineColor:Cesium.Color.BLACK,outlineWidth:2,style:Cesium.LabelStyle.FILL_AND_OUTLINE,
          pixelOffset:new Cesium.Cartesian2(0,-22),showBackground:true,
          backgroundColor:new Cesium.Color(.05,.02,.0,.92),backgroundPadding:new Cesium.Cartesian2(5,3),
          disableDepthTestDistance:Number.POSITIVE_INFINITY,show:true},
      }));
    });
  }
}

/* ══════════════════════════════════════════
   RENDER LIST
══════════════════════════════════════════ */
function renderList(){
  const filtered=getFiltered();
  const list=document.getElementById('event-list');
  const empty=document.getElementById('empty');
  if(!filtered.length){
    list.innerHTML='';empty.style.display='block';
    empty.textContent=allEvents.length?`No results for "${searchQ||'current filters'}" — try adjusting filters.`:'⟳ Fetching feeds… open ▶ DEBUG LOG to see status.';
    return;
  }
  empty.style.display='none';
  const maxSev=Math.max(...filtered.map(e=>e.sev),1);
  list.innerHTML=filtered.slice(0,150).map(ev=>{
    const cls=ev.sev>=8?'threat':ev.sev>=6?'warn':'';
    const pct=Math.round((ev.sev/maxSev)*100);
    const sel=ev.id===selectedId?'sel':'';
    const date=new Date(ev.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const vStr=ev.veh?`<span title="${ev.veh.label}">${ev.veh.icon}</span>`:'';
    return`<div class="ev ${cls} ${sel}" onclick="selectEvent('${ev.id}')">
      <span class="ico">${CAT_ICONS[ev.cat]||'📰'}</span>
      <div class="body">
        <div class="headline">${esc(ev.headline)}</div>
        <div class="meta">
          <span class="src-tag" style="background:${ev.srcColor}20;border:1px solid ${ev.srcColor}44;color:${ev.srcColor}">${ev.src}</span>
          ${ev.geo?`<span class="loc">📍${ev.geo.name}</span>`:''}${vStr}
          <span class="age">${date}</span>
        </div>
      </div>
      <div class="sbar"><div class="sbar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   RENDER TICKER
══════════════════════════════════════════ */
function renderTicker(){
  const el=document.getElementById('ticker-list');
  if(tickerTab==='news'){
    el.innerHTML=allEvents.slice(0,80).map(ev=>
      `<div class="tick" onclick="selectEvent('${ev.id}')">
        <div class="t-src" style="color:${ev.srcColor}">${CAT_ICONS[ev.cat]||'📰'} ${ev.srcLabel} ${ev.veh?ev.veh.icon:''}</div>
        <div class="t-hl">${esc(ev.headline)}</div>
        <div class="t-meta">${new Date(ev.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'})}${ev.geo?' · 📍'+ev.geo.name:''}</div>
      </div>`).join('')||'<div class="tick" style="color:rgba(0,255,157,.3);padding:12px">Fetching…</div>';
  }else if(tickerTab==='flights'){
    el.innerHTML=liveFlights.slice(0,80).map(f=>
      `<div class="tick">
        <div class="t-src" style="color:#b06fff">✈️ ${f.callsign||f.icao}</div>
        <div class="t-hl">${f.country} · ${f.alt?f.alt+'ft':''} ${f.speed||''} ${f.heading||''}</div>
        <div class="t-meta">${f.lat.toFixed(2)}°, ${f.lon.toFixed(2)}°</div>
      </div>`).join('')||'<div class="tick" style="color:rgba(0,255,157,.3);padding:12px">No flight data — OpenSky may be rate limited</div>';
  }else if(tickerTab==='sats'){
    el.innerHTML=liveSats.slice(0,80).map(s=>
      `<div class="tick">
        <div class="t-src" style="color:${s.color}">🛰️ ${s.group}</div>
        <div class="t-hl">${esc(s.name)}</div>
        <div class="t-meta">Alt: ${s.alt}km · ${s.lat.toFixed(2)}°, ${s.lon.toFixed(2)}°</div>
      </div>`).join('')||'<div class="tick" style="color:rgba(0,255,157,.3);padding:12px">No satellite data</div>';
  }else{
    const all=[
      ...wxAlerts.map(a=>({icon:'⚠️',color:'#ffc000',title:a.event,sub:a.area,sev:a.severity})),
      ...storms.map(s=>({icon:'🌀',color:'#ff6600',title:s.title,sub:'NHC Active Storm',sev:'Extreme'})),
    ];
    el.innerHTML=all.slice(0,60).map(a=>
      `<div class="tick">
        <div class="t-src" style="color:${a.color}">${a.icon} NOAA · ${a.sev}</div>
        <div class="t-hl">${esc(a.title)}</div>
        <div class="t-meta">${esc(a.sub)}</div>
      </div>`).join('')||'<div class="tick" style="color:rgba(0,255,157,.3);padding:12px">No active alerts</div>';
  }
}

function switchTab(tab){
  tickerTab=tab;
  document.querySelectorAll('.ttab').forEach((b,i)=>b.classList.toggle('on',['news','flights','sats','wx'][i]===tab));
  renderTicker();
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function getFiltered(){
  const q=searchQ.toLowerCase().trim();
  const cut=Date.now()-dayRange*86400000;
  return allEvents.filter(ev=>{
    if(ev.ts<cut)return false;
    if(!activeSrcs.has(ev.src))return false;
    if(!activeCats.has(ev.cat))return false;
    if(q){const hay=(ev.headline+' '+(ev.geo?.name||'')+' '+ev.srcLabel+' '+ev.cat+' '+(ev.text||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}
function detectGeo(text){
  const lower=text.toLowerCase();
  const sorted=Object.entries(GEO).sort((a,b)=>b[0].length-a[0].length);
  for(const[name,c]of sorted){if(lower.includes(name))return{name,lat:c[0],lon:c[1]};}
  return null;
}
function detectCat(text){for(const[cat,rx]of Object.entries(CAT_RX)){if(rx.test(text))return cat;}return'general';}
function calcSev(text,cat){
  let s=3;
  if(cat==='conflict'||cat==='military')s+=3;
  if(cat==='naval'||cat==='aviation')s+=2;
  if(cat==='weather')s+=2;if(cat==='breaking')s+=2;
  if(/kill|dead|death|casualt|massacre|nuclear/i.test(text))s+=2;
  if(/hundreds|thousands|dozens/i.test(text))s+=1;
  return Math.min(s,10);
}
function makePinCanvas(icon,color,selected){
  const s=selected?36:26,c=document.createElement('canvas');
  c.width=s;c.height=s;
  const ctx=c.getContext('2d');
  ctx.beginPath();ctx.arc(s/2,s/2,s/2-1,0,Math.PI*2);
  ctx.fillStyle=selected?'rgba(255,255,255,.2)':'rgba(0,0,0,.65)';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=selected?2.5:1.5;ctx.stroke();
  ctx.font=`${Math.round(s*.44)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icon,s/2,s/2+1);return c;
}
function setStatus(s){
  document.getElementById('status-dot').className='dot '+(s==='live'?'live':s==='fetching'?'fetching':'err');
  document.getElementById('status-txt').textContent=s.toUpperCase();
}
function uid(){return Math.random().toString(36).slice(2,10);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══════════════════════════════════════════
   SELECT EVENT
══════════════════════════════════════════ */
function selectEvent(id){
  const ev=allEvents.find(e=>e.id===id);if(!ev)return;
  selectedId=id===selectedId?null:id;
  if(selectedId&&ev.geo){
    viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(ev.geo.lon,ev.geo.lat,2800000),duration:1.5});
    vehicleEnts.forEach(e=>{e.label.show=e._evId===id;});
  }
  if(selectedId&&ev.link){setTimeout(()=>{if(confirm(`Open article?\n\n${ev.headline}\n\n${ev.srcLabel}`))window.open(ev.link,'_blank');},500);}
  renderNewsMap();renderList();
}

/* ══════════════════════════════════════════
   TOGGLES
══════════════════════════════════════════ */
function toggleLayer(name){
  layers[name]=!layers[name];
  document.getElementById('lyr-'+name).classList.toggle('off',!layers[name]);
  if(name==='news'){renderNewsMap();renderList();}
  else if(name==='flights')renderFlights();
  else if(name==='sats')renderSatellites();
  else renderWeather();
}
function toggleSrc(id){
  activeSrcs.has(id)?activeSrcs.delete(id):activeSrcs.add(id);
  document.querySelectorAll('.src-btn').forEach(b=>b.classList.toggle('off',!activeSrcs.has(b.dataset.src)));
  renderNewsMap();renderFlights();renderSatellites();renderWeather();renderList();
}
function toggleCat(id){
  activeCats.has(id)?activeCats.delete(id):activeCats.add(id);
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('off',!activeCats.has(b.dataset.cat)));
  renderNewsMap();renderList();
}

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
function runSearch(){
  searchQ=document.getElementById('search').value.trim();
  renderNewsMap();renderList();
  const btn=document.getElementById('search-btn');
  const n=getFiltered().length;
  btn.textContent=`✓ ${n} found`;
  btn.style.borderColor='var(--g)';btn.style.background='rgba(0,255,157,.2)';
  setTimeout(()=>{btn.textContent='⌕ RUN';btn.style.borderColor='';btn.style.background='';},2000);
}
document.getElementById('search').addEventListener('keydown',e=>{if(e.key==='Enter')runSearch();});
document.getElementById('date-range').addEventListener('change',e=>{dayRange=parseInt(e.target.value);renderNewsMap();renderList();});

/* ══════════════════════════════════════════
   GLOBE HOVER + CLICK
══════════════════════════════════════════ */
const tip=document.getElementById('tooltip');
viewer.screenSpaceEventHandler.setInputAction(click=>{
  const p=viewer.scene.pick(click.position);
  if(p?.id?._evId)selectEvent(p.id._evId);
  else if(p?.id?._evIds?.length)selectEvent(allEvents.find(e=>e.id===p.id._evIds[0])?.id);
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

viewer.screenSpaceEventHandler.setInputAction(move=>{
  const p=viewer.scene.pick(move.endPosition);
  let html=null;
  if(p?.id?._isFlight){
    const f=p.id._flight;
    html=`<strong>✈️ ${f.callsign||f.icao}</strong>${f.country}<br>Alt: ${f.alt?f.alt+'ft':'–'} · ${f.speed||'–'} · Hdg: ${f.heading||'–'}`;
  }else if(p?.id?._isSat){
    const s=p.id._sat;
    html=`<strong>🛰️ ${s.name}</strong>Group: ${s.group}<br>Alt: ${s.alt}km · ${s.lat?.toFixed(2)}°, ${s.lon?.toFixed(2)}°`;
  }else if(p?.id?._isAlert){
    const a=p.id._alert;
    html=`<strong>⚠️ ${a.event}</strong>${a.area}<br>Severity: ${a.severity}`;
  }else if(p?.id?._isStorm){
    const s=p.id._storm;
    html=`<strong>🌀 ${s.title}</strong>${s.desc.slice(0,140)}`;
  }else if(p?.id?._evId){
    const ev=allEvents.find(e=>e.id===p.id._evId);
    if(ev)html=`<strong>${ev.veh?.icon||''} ${ev.veh?.label||'Event'}</strong><span style="color:${ev.srcColor}">[${ev.src}]</span> ${esc(ev.headline.slice(0,90))}${ev.geo?`<br>📍 ${ev.geo.name}`:''}`;
  }else if(p?.id?._evIds){
    const evs=allEvents.filter(e=>p.id._evIds.includes(e.id)).slice(0,5);
    if(evs.length)html=`<strong>📍 ${evs[0].geo?.name?.toUpperCase()||''} — ${evs.length} stories</strong>`+evs.map(e=>`<span style="color:${e.srcColor}">[${e.src}]</span> ${esc(e.headline.slice(0,55))}…`).join('<br>');
  }
  if(html){tip.innerHTML=html;tip.style.display='block';tip.style.left=(move.endPosition.x+14)+'px';tip.style.top=(move.endPosition.y-14)+'px';}
  else tip.style.display='none';
},Cesium.ScreenSpaceEventType.MOUSE_MOVE);

setInterval(()=>{document.getElementById('clock').textContent=new Date().toUTCString().replace('GMT','UTC');},1000);
document.getElementById('clock').textContent=new Date().toUTCString().replace('GMT','UTC');
