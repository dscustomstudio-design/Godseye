<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>God's Eye V17</title>
<script src="https://cdn.jsdelivr.net/npm/cesium@1.105.0/Build/Cesium/Cesium.js"></script>
<link href="https://cdn.jsdelivr.net/npm/cesium@1.105.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body,#cesiumContainer{width:100%;height:100%;overflow:hidden;background:#000}
:root{--g:#00ff9d;--c:#00d4ff;--r:#ff3b3b;--a:#ffc000;--p:#b06fff;--s:#fbbf24;
  --panel:rgba(4,9,20,0.97);--border:rgba(0,212,255,0.15);--bar-h:52px;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:8000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);}

/* ══ BOTTOM CONTROL BAR ══ */
#ctrl-bar{
  position:fixed;bottom:0;left:0;right:0;height:var(--bar-h);
  background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  font-family:'Share Tech Mono',monospace;z-index:500;
}
#bar-logo{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;
  color:#fff;letter-spacing:3px;white-space:nowrap;display:flex;align-items:center;gap:7px;}
#bar-dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;}
#bar-dot.live{background:var(--g);animation:blink 1.4s infinite;}
#bar-dot.fetching{background:var(--a);animation:blink .5s infinite;}
#bar-dot.err{background:var(--r);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
#bar-divider{width:1px;height:28px;background:var(--border);flex-shrink:0;}

/* layer icon buttons */
#bar-layers{display:flex;align-items:center;gap:2px;flex:1;justify-content:center;}
.lyr-icon{position:relative;width:38px;height:38px;border-radius:6px;border:1px solid transparent;
  background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;
  justify-content:center;transition:background .15s,border-color .15s;flex-shrink:0;}
.lyr-icon:hover{background:rgba(0,212,255,.1);border-color:var(--border);}
.lyr-icon.active{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);}
.lyr-icon.off{opacity:.25;}
.lyr-icon .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:rgba(4,9,20,.98);border:1px solid var(--border);border-radius:3px;
  padding:3px 7px;font-size:9px;color:var(--c);white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;}
.lyr-icon:hover .tip{opacity:1;}
.lyr-icon .badge{position:absolute;top:2px;right:2px;background:var(--r);color:#fff;
  font-size:7px;border-radius:8px;padding:0 3px;min-width:12px;text-align:center;
  font-family:'Share Tech Mono',monospace;line-height:12px;}

/* right side of bar */
#bar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
#bar-clock{font-size:9px;color:rgba(0,212,255,.5);white-space:nowrap;}
#drawer-toggle{background:transparent;border:1px solid var(--border);border-radius:4px;
  color:var(--c);font-size:11px;cursor:pointer;padding:4px 10px;font-family:inherit;
  display:flex;align-items:center;gap:5px;transition:background .15s;white-space:nowrap;}
#drawer-toggle:hover{background:rgba(0,212,255,.1);}
#drawer-toggle.open{border-color:var(--g);color:var(--g);}

/* ══ SLIDE-UP DRAWER ══ */
#drawer{
  position:fixed;left:0;right:0;bottom:var(--bar-h);
  height:0;overflow:hidden;
  background:var(--panel);border-top:1px solid var(--border);
  transition:height .3s cubic-bezier(.4,0,.2,1);
  z-index:490;display:flex;flex-direction:column;
}
#drawer.open{height:44vh;}

/* drawer tab bar */
#drawer-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.dtab{flex:1;padding:9px 0;font-family:'Share Tech Mono',monospace;font-size:10px;
  color:rgba(0,212,255,.4);background:transparent;border:none;cursor:pointer;
  letter-spacing:1px;transition:color .15s,background .15s;border-bottom:2px solid transparent;}
.dtab:hover{color:var(--c);background:rgba(0,212,255,.05);}
.dtab.on{color:var(--g);border-bottom-color:var(--g);}

/* drawer content */
#drawer-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.dpane{display:none;flex:1;flex-direction:column;overflow:hidden;}
.dpane.on{display:flex;}

/* intel pane — event list */
#intel-search{padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:6px;}
#intel-search input{flex:1;background:rgba(0,255,157,.05);border:1px solid rgba(0,255,157,.15);
  border-radius:3px;color:var(--g);font-family:'Share Tech Mono',monospace;font-size:11px;
  padding:5px 8px;outline:none;}
#intel-search input:focus{border-color:rgba(0,255,157,.5);}
#intel-search input::placeholder{color:rgba(0,255,157,.25);}
#intel-search select{background:rgba(0,212,255,.05);border:1px solid var(--border);
  border-radius:3px;color:var(--c);font-family:inherit;font-size:10px;padding:5px 6px;
  outline:none;cursor:pointer;}
#intel-search select option{background:#040914;}
#intel-search button{padding:5px 10px;border-radius:3px;border:1px solid rgba(0,255,157,.4);
  background:rgba(0,255,157,.08);color:var(--g);font-family:inherit;font-size:10px;
  cursor:pointer;white-space:nowrap;}
#event-list{overflow-y:auto;flex:1;}
#event-list::-webkit-scrollbar{width:2px;}
#event-list::-webkit-scrollbar-thumb{background:var(--border);}
.ev{display:flex;align-items:flex-start;gap:7px;padding:7px 12px;cursor:pointer;
  border-left:2px solid transparent;transition:background .1s;}
.ev:hover{background:rgba(0,255,157,.04);}
.ev.sel{background:rgba(0,255,157,.07);border-left-color:var(--g);}
.ev.threat{border-left-color:var(--r);}
.ev.warn{border-left-color:var(--a);}
.ev .ico{font-size:14px;flex-shrink:0;margin-top:1px;}
.ev .body{flex:1;min-width:0;}
.ev .headline{color:#ccc;font-size:10px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ev .meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.ev .src-tag{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:600;}
.ev .loc{font-size:9px;color:var(--c);}
.ev .age{font-size:9px;color:rgba(0,255,157,.3);}
.ev .sbar{width:18px;flex-shrink:0;}
.ev .sbar-fill{height:2px;border-radius:1px;background:var(--g);margin-top:8px;}
.ev.threat .sbar-fill{background:var(--r);}
.ev.warn .sbar-fill{background:var(--a);}
#empty{padding:20px 14px;color:rgba(0,255,157,.3);font-size:11px;line-height:1.7;}

/* feed pane — ticker */
#feed-tabs{display:flex;gap:3px;padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.ftab{font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid var(--border);
  cursor:pointer;font-family:'Share Tech Mono',monospace;color:rgba(0,255,157,.4);
  background:transparent;letter-spacing:.5px;}
.ftab.on{color:var(--g);border-color:var(--g);background:rgba(0,255,157,.08);}
#ticker-list{overflow-y:auto;flex:1;}
#ticker-list::-webkit-scrollbar{width:2px;}
#ticker-list::-webkit-scrollbar-thumb{background:var(--border);}
.tick{padding:6px 12px;border-bottom:1px solid rgba(0,200,255,.05);cursor:pointer;}
.tick:hover{background:rgba(0,200,255,.04);}
.tick .t-src{font-size:8px;font-weight:600;margin-bottom:2px;}
.tick .t-hl{font-size:9px;color:#bbb;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tick .t-meta{font-size:8px;color:rgba(0,255,157,.28);margin-top:2px;}

/* filters pane */
#filters-pane{overflow-y:auto;padding:10px 12px;flex:1;}
.fgroup{margin-bottom:12px;}
.fgroup-title{font-size:9px;color:rgba(0,212,255,.5);letter-spacing:2px;
  margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.fgroup-btns{display:flex;flex-wrap:wrap;gap:4px;}
.fsrc-btn,.fcat-btn{padding:3px 8px;border-radius:3px;border:1px solid;cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:600;
  background:transparent;transition:opacity .15s;color:#fff;}
.fsrc-btn.off,.fcat-btn.off{opacity:.2;}

/* debug log — inside filters */
#debug-toggle{width:100%;padding:4px 0;background:transparent;border:none;
  border-top:1px solid var(--border);color:rgba(0,212,255,.4);
  font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;
  text-align:left;margin-top:8px;letter-spacing:1px;}
#debug-wrap{display:none;margin-top:6px;}
#debug-wrap.show{display:block;}
#debug-inner{font-size:9px;max-height:80px;overflow-y:auto;line-height:1.6;}
#debug-inner .ok{color:#00ff9d;}
#debug-inner .fail{color:#ff3b3b;}
#debug-inner .warn{color:#ffc000;}

/* zone draw controls */
#zone-controls{display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
#zone-draw-btn{padding:4px 10px;border-radius:3px;border:1px solid #ff00ff;
  background:rgba(255,0,255,.08);color:#ff00ff;font-family:'Share Tech Mono',monospace;
  font-size:9px;cursor:pointer;letter-spacing:1px;}
#zone-hint{font-size:9px;color:rgba(255,0,255,.4);}

/* ══ TOOLTIP ══ */
#tooltip{position:fixed;background:rgba(2,7,18,.97);border:1px solid var(--c);
  border-radius:3px;padding:8px 12px;font-family:'Share Tech Mono',monospace;
  font-size:10px;color:var(--c);pointer-events:none;display:none;
  max-width:270px;line-height:1.8;z-index:9999;}
#tooltip strong{color:#fff;font-size:11px;display:block;margin-bottom:3px;}

/* ══ CAMERA POPUP ══ */
#cam-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:none;}
#cam-overlay.show{display:block;}
#cam-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:520px;max-width:92vw;background:var(--panel);border:1px solid var(--c);
  border-radius:4px;z-index:9999;display:none;flex-direction:column;overflow:hidden;}
#cam-popup.show{display:flex;}
#cam-header{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
#cam-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;
  color:var(--c);letter-spacing:2px;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;max-width:400px;}
#cam-close{background:transparent;border:1px solid var(--border);border-radius:2px;
  color:var(--r);font-size:14px;cursor:pointer;padding:2px 8px;line-height:1;}
#cam-close:hover{background:rgba(255,59,59,.15);}
#cam-body{position:relative;width:100%;padding-top:56.25%;background:#000;}
#cam-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
#cam-meta{padding:6px 12px;font-size:9px;color:rgba(0,212,255,.5);
  border-top:1px solid var(--border);display:flex;gap:14px;flex-shrink:0;}

/* ══ LOADING BAR ══ */
#lbar{position:fixed;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
  background-size:200%;animation:sweep 1s linear infinite;display:none;z-index:9999;}
@keyframes sweep{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ MOBILE ══ */
@media(max-width:600px){
  #bar-logo span{display:none;}
  .lyr-icon{width:32px;height:32px;font-size:14px;}
  #drawer.open{height:55vh;}
  #cam-popup{width:96vw;}
}
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<!-- LOADING BAR -->
<div id="lbar"></div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- CAMERA POPUP -->
<div id="cam-overlay" onclick="closeCamera()"></div>
<div id="cam-popup">
  <div id="cam-header">
    <span id="cam-title">📹 LIVE FEED</span>
    <button id="cam-close" onclick="closeCamera()">✕</button>
  </div>
  <div id="cam-body">
    <iframe id="cam-frame" allowfullscreen allow="autoplay"></iframe>
  </div>
  <div id="cam-meta">
    <span id="cam-loc">–</span>
    <span id="cam-src">–</span>
    <span id="cam-coord">–</span>
  </div>
</div>

<!-- SLIDE-UP DRAWER -->
<div id="drawer">
  <div id="drawer-tabs">
    <button class="dtab on" onclick="switchDrawerTab('intel')">⬡ INTEL</button>
    <button class="dtab"    onclick="switchDrawerTab('feed')">📡 FEED</button>
    <button class="dtab"    onclick="switchDrawerTab('filters')">⚙ FILTERS</button>
  </div>
  <div id="drawer-content">

    <!-- INTEL PANE -->
    <div class="dpane on" id="pane-intel">
      <div id="intel-search">
        <input type="text" id="search" placeholder="Search headlines, locations, callsigns…" autocomplete="off">
        <select id="date-range">
          <option value="1">24h</option>
          <option value="3">3d</option>
          <option value="7">7d</option>
          <option value="30" selected>30d</option>
        </select>
        <button onclick="runSearch()">⌕ RUN</button>
      </div>
      <div id="event-list"><div id="empty">⟳ Initialising intel feeds…</div></div>
    </div>

    <!-- FEED PANE -->
    <div class="dpane" id="pane-feed">
      <div id="feed-tabs">
        <button class="ftab on" onclick="switchFeedTab('news')">NEWS</button>
        <button class="ftab"    onclick="switchFeedTab('flights')">FLIGHTS</button>
        <button class="ftab"    onclick="switchFeedTab('ships')">SHIPS</button>
        <button class="ftab"    onclick="switchFeedTab('sats')">SATS</button>
        <button class="ftab"    onclick="switchFeedTab('quakes')">QUAKES</button>
        <button class="ftab"    onclick="switchFeedTab('threat')">THREAT</button>
        <button class="ftab"    onclick="switchFeedTab('cams')">CAMS</button>
        <button class="ftab"    onclick="switchFeedTab('wx')">WX</button>
      </div>
      <div id="ticker-list"></div>
    </div>

    <!-- FILTERS PANE -->
    <div class="dpane" id="pane-filters">
      <div id="filters-pane">
        <div class="fgroup">
          <div class="fgroup-title">DATA SOURCES</div>
          <div class="fgroup-btns">
            <button class="fsrc-btn" data-src="BBC"       style="border-color:#bb1919" onclick="toggleSrc('BBC')">BBC</button>
            <button class="fsrc-btn" data-src="CNN"       style="border-color:#cc0000" onclick="toggleSrc('CNN')">CNN</button>
            <button class="fsrc-btn" data-src="FOX"       style="border-color:#2255bb" onclick="toggleSrc('FOX')">FOX</button>
            <button class="fsrc-btn" data-src="ALJAZ"     style="border-color:#009970" onclick="toggleSrc('ALJAZ')">AL JAZ</button>
            <button class="fsrc-btn" data-src="NBC"       style="border-color:#fa8c00" onclick="toggleSrc('NBC')">NBC</button>
            <button class="fsrc-btn" data-src="REUTERS"   style="border-color:#ff6900" onclick="toggleSrc('REUTERS')">REUTERS</button>
            <button class="fsrc-btn" data-src="AP"        style="border-color:#aaa"    onclick="toggleSrc('AP')">AP</button>
            <button class="fsrc-btn" data-src="GUARDIAN"  style="border-color:#005689" onclick="toggleSrc('GUARDIAN')">GUARDIAN</button>
            <button class="fsrc-btn" data-src="NOAA"      style="border-color:#ffc000" onclick="toggleSrc('NOAA')">NOAA</button>
            <button class="fsrc-btn" data-src="OPENSKY"   style="border-color:#b06fff" onclick="toggleSrc('OPENSKY')">OPENSKY</button>
            <button class="fsrc-btn" data-src="CELESTRAK" style="border-color:#fbbf24" onclick="toggleSrc('CELESTRAK')">SATS</button>
            <button class="fsrc-btn" data-src="AISHUB"    style="border-color:#00d4ff" onclick="toggleSrc('AISHUB')">AIS</button>
            <button class="fsrc-btn" data-src="USGS"      style="border-color:#ff8c00" onclick="toggleSrc('USGS')">USGS</button>
            <button class="fsrc-btn" data-src="CISA"      style="border-color:#ff3b3b" onclick="toggleSrc('CISA')">CISA</button>
            <button class="fsrc-btn" data-src="WINDY"     style="border-color:#39ff14" onclick="toggleSrc('WINDY')">WINDY</button>
            <button class="fsrc-btn" data-src="DOT"       style="border-color:#39ff14" onclick="toggleSrc('DOT')">DOT</button>
          </div>
        </div>
        <div class="fgroup">
          <div class="fgroup-title">CATEGORIES</div>
          <div class="fgroup-btns">
            <button class="fcat-btn" data-cat="military"  style="border-color:var(--border)" onclick="toggleCat('military')">🪖 Military</button>
            <button class="fcat-btn" data-cat="conflict"  style="border-color:var(--border)" onclick="toggleCat('conflict')">⚔️ Conflict</button>
            <button class="fcat-btn" data-cat="naval"     style="border-color:var(--border)" onclick="toggleCat('naval')">🚢 Naval</button>
            <button class="fcat-btn" data-cat="aviation"  style="border-color:var(--border)" onclick="toggleCat('aviation')">✈️ Aviation</button>
            <button class="fcat-btn" data-cat="weather"   style="border-color:var(--border)" onclick="toggleCat('weather')">🌩 Weather</button>
            <button class="fcat-btn" data-cat="disaster"  style="border-color:var(--border)" onclick="toggleCat('disaster')">🌊 Disaster</button>
            <button class="fcat-btn" data-cat="politics"  style="border-color:var(--border)" onclick="toggleCat('politics')">🏛 Politics</button>
            <button class="fcat-btn" data-cat="economy"   style="border-color:var(--border)" onclick="toggleCat('economy')">📈 Economy</button>
            <button class="fcat-btn" data-cat="breaking"  style="border-color:var(--border)" onclick="toggleCat('breaking')">🔴 Breaking</button>
          </div>
        </div>
        <div class="fgroup">
          <div class="fgroup-title">SURFACE CONDITIONS</div>
          <div id="wx-rows" style="font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,255,157,.5)">Fetching NOAA…</div>
        </div>
        <div id="zone-controls">
          <button id="zone-draw-btn" onclick="startZoneDraw()">⚠️ DRAW ZONE</button>
          <button onclick="clearZones()" style="padding:4px 10px;border-radius:3px;border:1px solid rgba(255,0,255,.2);background:transparent;color:rgba(255,0,255,.4);font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;">CLEAR ZONES</button>
          <span id="zone-hint" style="display:none;font-size:9px;color:#ff00ff">Click globe to place</span>
        </div>
        <button id="debug-toggle" onclick="toggleDebug()">▶ FEED DEBUG LOG</button>
        <div id="debug-wrap"><div id="debug-inner"></div></div>
      </div>
    </div>

  </div>
</div>

<!-- BOTTOM CONTROL BAR -->
<div id="ctrl-bar">
  <div id="bar-logo">
    <div id="bar-dot"></div>
    <span>GOD'S EYE</span>
  </div>
  <div id="bar-divider"></div>

  <div id="bar-layers">
    <button class="lyr-icon active" id="lyr-news"    onclick="toggleLayer('news')"    title="News">📰<span class="tip">NEWS <span id="ct-news">0</span></span></button>
    <button class="lyr-icon active" id="lyr-flights" onclick="toggleLayer('flights')" title="Flights">✈️<span class="tip">FLIGHTS <span id="ct-flights">0</span></span></button>
    <button class="lyr-icon active" id="lyr-ships"   onclick="toggleLayer('ships')"   title="Ships">🚢<span class="tip">SHIPS <span id="ct-ships">0</span></span></button>
    <button class="lyr-icon active" id="lyr-sats"    onclick="toggleLayer('sats')"    title="Satellites">🛰️<span class="tip">SATS <span id="ct-sats">0</span></span></button>
    <button class="lyr-icon active" id="lyr-quakes"  onclick="toggleLayer('quakes')"  title="Earthquakes">🌋<span class="tip">QUAKES <span id="ct-quakes">0</span></span></button>
    <button class="lyr-icon active" id="lyr-threat"  onclick="toggleLayer('threat')"  title="Threat Intel">☠️<span class="tip">THREAT <span id="ct-threats">0</span></span></button>
    <button class="lyr-icon active" id="lyr-cameras" onclick="toggleLayer('cameras')" title="Cameras">📹<span class="tip">CAMS <span id="ct-cameras">0</span></span></button>
    <button class="lyr-icon active" id="lyr-weather" onclick="toggleLayer('weather')" title="WX Alerts">🌩<span class="tip">ALERTS <span id="ct-alerts">0</span></span></button>
    <button class="lyr-icon active" id="lyr-storms"  onclick="toggleLayer('storms')"  title="Storms">🌀<span class="tip">STORMS <span id="ct-storms">0</span></span></button>
    <button class="lyr-icon active" id="lyr-zones"   onclick="toggleLayer('zones')"   title="Alert Zones">⚠️<span class="tip">ZONES <span id="ct-zones">0</span></span></button>
  </div>

  <div id="bar-divider"></div>
  <div id="bar-right">
    <span id="bar-clock" id="clock">──</span>
    <button id="drawer-toggle" onclick="toggleDrawer()">▲ OPEN</button>
  </div>
</div>

<script>
const PROXY = u => `/proxy?url=${encodeURIComponent(u)}`;

/* ══════════════════════════════════════════
   CESIUM — dark CARTO tiles, no ion deps
══════════════════════════════════════════ */

async function fetchRSS(){
  const results=[]; let ok=0;
  await Promise.allSettled(RSS_FEEDS.map(async src=>{
    try{
      log('warn',`Fetching ${src.label}…`);
      const res=await fetch(PROXY(src.url),{signal:AbortSignal.timeout(15000)});
      if(!res.ok){log('fail',`${src.label}: HTTP ${res.status}`);return;}
      const txt=await res.text();
      const doc=new DOMParser().parseFromString(txt,'text/xml');
      const items=[...doc.querySelectorAll('item')];
      if(!items.length){log('fail',`${src.label}: 0 items`);return;}
      ok++;
      log('ok',`${src.label}: ${items.length} items`);
      items.slice(0,30).forEach(el=>{
        const title=(el.querySelector('title')?.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim();
        const desc =(el.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,'').replace(/<!\[CDATA\[|\]\]>/g,'').slice(0,300);
        const link =el.querySelector('link')?.textContent?.trim()||'';
        const pub  =el.querySelector('pubDate')?.textContent||'';
        if(!title)return;
        const text=title+' '+desc;
        const geo=detectGeo(text),cat=detectCat(text),sev=calcSev(text,cat);
        const ts=pub?new Date(pub).getTime():Date.now();
        const veh=geo?assignVehicle(cat,geo.name):null;
        results.push({id:uid(),src:src.id,srcLabel:src.label,srcColor:src.color,headline:title,text,geo,cat,sev,ts,link,veh});
      });
    }catch(e){log('fail',`${src.label}: ${e.message}`);}
  }));
  // status in layer tooltip
  return results;
}

function parseFlights(json){

  const flights=json.states.filter(s=>s[5]!=null&&s[6]!=null&&!s[8]).slice(0,500).map(s=>({

    lon:s[5],lat:s[6],alt:Math.round((s[7]||s[13]||0)*3.281),
    speed:s[9]?Math.round(s[9]*1.944)+'kn':null,heading:s[10]?Math.round(s[10])+'°':null,

  log('ok',`OpenSky: ${flights.length} aircraft`);

  document.getElementById('ct-flights').textContent=flights.length;
  return flights;
}

/* ══════════════════════════════════════════
   FETCH SATELLITES (CelesTrak TLE)
══════════════════════════════════════════ */
const CELESTRAK_SOURCES=[
  {name:'ISS',      color:'#00ff9d', url:'https://celestrak.org/SOCRATES/query.php?CATNR=25544&FORMAT=TLE',    limit:1},
  {name:'Starlink', color:'#60a5fa', url:'https://celestrak.org/SOCRATES/query.php?GROUP=starlink&FORMAT=TLE', limit:60},
  {name:'Military', color:'#ff3b3b', url:'https://celestrak.org/SOCRATES/query.php?GROUP=military&FORMAT=TLE', limit:30},
  {name:'Weather',  color:'#ffc000', url:'https://celestrak.org/SOCRATES/query.php?GROUP=weather&FORMAT=TLE',  limit:20},
  {name:'GPS',      color:'#a78bfa', url:'https://celestrak.org/SOCRATES/query.php?GROUP=gps-ops&FORMAT=TLE',  limit:20},
];

function parseTLE(txt,name,color,limit){
  const lines=txt.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  const sats=[];
  for(let i=0;i<lines.length-1&&sats.length<limit;i++){
    const l1=lines[i],l2=lines[i+1];
    if(l1.startsWith('1 ')&&l2.startsWith('2 ')){
      try{const rec=satellite.twoline2satrec(l1,l2);sats.push({name,satrec:rec,color,group:name});i++;}catch(e){}
    }else if(i<lines.length-2){
      const l3=lines[i+2];
      if(l2.startsWith('1 ')&&l3.startsWith('2 ')){
        try{const rec=satellite.twoline2satrec(l2,l3);sats.push({name:l1||name,satrec:rec,color,group:name});i+=2;}catch(e){}
      }
    }
  }
  return sats;
}

function propagateSat(satrec,date){
  try{
    const pv=satellite.propagate(satrec,date);
    if(!pv.position)return null;
    const gmst=satellite.gstime(date);
    const geo=satellite.eciToGeodetic(pv.position,gmst);
    return{lat:satellite.degreesLat(geo.latitude),lon:satellite.degreesLong(geo.longitude),alt:Math.round(geo.height)};
  }catch(e){return null;}
}

function getOrbitTrack(satrec,steps=60,stepMin=1.5){
  const pts=[];const now=new Date();
  for(let i=0;i<steps;i++){
    const t=new Date(now.getTime()+i*stepMin*60000);
    const p=propagateSat(satrec,t);
    if(p)pts.push([p.lat,p.lon]);
  }
  // Split at antimeridian
  const segs=[];let seg=[];
  for(let i=0;i<pts.length;i++){
    if(i>0&&Math.abs(pts[i][1]-pts[i-1][1])>180){if(seg.length>1)segs.push(seg);seg=[];}
    seg.push(pts[i]);
  }
  if(seg.length>1)segs.push(seg);
  return segs;
}

async function fetchSatellites(){
  if(!window.satellite){log('warn','satellite.js not ready');return[];}
  log('warn','Fetching TLEs from CelesTrak…');
  const all=[];
  await Promise.allSettled(CELESTRAK_SOURCES.map(async src=>{
    try{
      const res=await fetch(PROXY(src.url),{signal:AbortSignal.timeout(15000)});
      if(!res.ok){log('fail',`TLE ${src.name}: HTTP ${res.status}`);return;}
      const txt=await res.text();
      if(!txt||txt.length<10){log('fail',`TLE ${src.name}: empty`);return;}
      const parsed=parseTLE(txt,src.name,src.color,src.limit);
      log('ok',`TLE ${src.name}: ${parsed.length} sats`);
      all.push(...parsed);
    }catch(e){log('fail',`TLE ${src.name}: ${e.message}`);}
  }));
  const now=new Date();
  const result=all.map(s=>{const p=propagateSat(s.satrec,now);return p?{...s,...p}:null;}).filter(Boolean);
  log('ok',`Satellites propagated: ${result.length}`);
  document.getElementById('ct-sats').textContent=result.length;
  // badge removed
  // status in layer tooltip
  return result;
}

function updateSatPositions(){
  if(!liveSats.length||!window.satellite)return;
  const now=new Date();
  liveSats=liveSats.map(s=>{const p=propagateSat(s.satrec,now);return p?{...s,...p}:s;});
  renderSatellites();
}

async function fetchNOAAAlerts(){
  try{
    log('warn','Fetching NOAA alerts…');
    const res=await fetch(PROXY('https://api.weather.gov/alerts/active?status=actual&urgency=Immediate,Expected'),{signal:AbortSignal.timeout(14000)});
    if(!res.ok){log('fail',`NOAA: HTTP ${res.status}`);return[];}
    const json=await res.json();
    if(!json.features){log('fail','NOAA: no features');return[];}
    const alerts=json.features.slice(0,100).map(f=>{
      const p=f.properties;
      let lat=null,lon=null;
      const coords=f.geometry?.coordinates;
      if(coords){const flat=coords.flat(10).filter(x=>typeof x==='number');if(flat.length>=2){lon=flat[0];lat=flat[1];}}
      if(!lat){const g=detectGeo(p.areaDesc||'');if(g){lat=g.lat;lon=g.lon;}}
      return{id:'wx_'+uid(),event:p.event||'Alert',headline:(p.headline||p.event||'NOAA Alert').slice(0,120),severity:p.severity||'Unknown',urgency:p.urgency||'',area:(p.areaDesc||'').slice(0,60),lat,lon,ts:Date.now()};
    }).filter(a=>a.lat&&a.lon);
    log('ok',`NOAA alerts: ${alerts.length}`);
    return alerts;
  }catch(e){log('fail','NOAA: '+e.message);return[];}
}

      [...doc.querySelectorAll('item')].forEach(el=>{
        const title=el.querySelector('title')?.textContent||'';
        const desc=el.querySelector('description')?.textContent||'';
        const m=desc.match(/(\d+\.?\d*)\s*(N|S)[,\s]+(\d+\.?\d*)\s*(W|E)/i);
        if(m){
          const lat=parseFloat(m[1])*(m[2].toUpperCase()==='S'?-1:1);
          const lon=parseFloat(m[3])*(m[4].toUpperCase()==='W'?-1:1);
          all.push({id:'st_'+uid(),title,desc:desc.replace(/<[^>]+>/g,'').slice(0,200),lat,lon});
        }
      });
    }catch(e){}
  }
  log(all.length?'ok':'warn',`NHC storms: ${all.length}`);
  return all;
}

const WX_STATIONS=[{name:'New York',id:'KNYC'},{name:'Miami',id:'KMIA'},{name:'Chicago',id:'KORD'},{name:'Los Angeles',id:'KLAX'}];
async function fetchNOAAConditions(){
  const results=[];
  await Promise.allSettled(WX_STATIONS.map(async st=>{
    try{
      const res=await fetch(PROXY(`https://api.weather.gov/stations/${st.id}/observations/latest`),{signal:AbortSignal.timeout(10000)});
      if(!res.ok)return;
      const json=await res.json();
      const p=json.properties;
      if(p){
        const tempC=p.temperature?.value;
        const tempF=tempC!=null?Math.round(tempC*9/5+32):null;
        const wind=p.windSpeed?.value?Math.round(p.windSpeed.value*0.621)+' mph':null;
        results.push({name:st.name,tempF,wind,cond:(p.textDescription||'').slice(0,18)||'–'});
      }
    }catch(e){}
  }));
  const rows=document.getElementById('wx-rows');
  if(!rows)return;
  rows.innerHTML=results.length
    ?results.map(r=>`<div class="wx-row"><span>${r.name}</span><span>${r.tempF!=null?r.tempF+'°F':''} ${r.wind||''} ${r.cond}</span></div>`).join('')
    :'<div style="color:rgba(255,150,0,.5)">NOAA unavailable</div>';
}

/* ══════════════════════════════════════════
   FETCH SHIPS — AISHub (free, no key)
══════════════════════════════════════════ */
async function fetchShips(){
  try{
    log('warn','Fetching AIS ship data…');
    // AISHub free JSON endpoint — no key needed, returns last 5min positions
    const url='https://data.aishub.net/ws.php?username=0&format=1&output=json&compress=0&latmin=-70&latmax=75&lonmin=-180&lonmax=180';
    const res=await fetch(PROXY(url),{signal:AbortSignal.timeout(18000)});
    if(!res.ok){log('fail',`AISHub: HTTP ${res.status}`);return[];}
    const json=await res.json();
    // AISHub returns [[header],[data...]] format
    if(!json||!json[1]){log('fail','AISHub: no data array');return[];}
    const ships=json[1].filter(s=>s.LATITUDE&&s.LONGITUDE).slice(0,400).map(s=>({
      mmsi:s.MMSI||'',
      name:(s.NAME||'Unknown').trim(),
      lat:parseFloat(s.LATITUDE),
      lon:parseFloat(s.LONGITUDE),
      speed:s.SOG?parseFloat(s.SOG).toFixed(1)+'kn':null,
      heading:s.COG?Math.round(s.COG)+'°':null,
      type:s.SHIPTYPE||0,
      dest:(s.DESTINATION||'').trim(),
      flag:s.FLAG||'',
    }));
    log('ok',`AISHub: ${ships.length} vessels`);
    // status in layer tooltip
    document.getElementById('ct-ships').textContent=ships.length;
    return ships;
  }catch(e){
    log('fail','AISHub: '+e.message);
    // status in layer tooltip
    return[];
  }
}

/* ══════════════════════════════════════════
   FETCH EARTHQUAKES — USGS GeoJSON (free)
══════════════════════════════════════════ */
async function fetchQuakes(){
  try{
    log('warn','Fetching USGS earthquakes…');
    // M2.5+ past 24 hours — reliable, no key
    const url='https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson';
    const res=await fetch(PROXY(url),{signal:AbortSignal.timeout(14000)});
    if(!res.ok){log('fail',`USGS: HTTP ${res.status}`);return[];}
    const json=await res.json();
    if(!json.features){log('fail','USGS: no features');return[];}
    const quakes=json.features.map(f=>{
      const p=f.properties;
      const [lon,lat,depth]=f.geometry.coordinates;
      return{
        id:'q_'+f.id,
        place:p.place||'Unknown location',
        mag:p.mag||0,
        lat,lon,depth:Math.round(depth||0),
        time:new Date(p.time).toLocaleTimeString(),
        url:p.url||'',
      };
    }).filter(q=>q.lat&&q.lon);
    log('ok',`USGS: ${quakes.length} earthquakes`);
    // status in layer tooltip
    document.getElementById('ct-quakes').textContent=quakes.length;
    return quakes;
  }catch(e){log('fail','USGS: '+e.message);return[];}
}

      });
      log('ok',`CISA: ${all.filter(t=>t.src==='CISA').length} alerts`);

    if(res.ok){

        'NL':[52.37,4.90],'BR':[-15.78,-47.93],'UA':[50.45,30.52],'FR':[48.85,2.35],
        'GB':[51.51,-0.13],'KR':[37.55,126.99],'JP':[35.68,139.69],'IN':[28.61,77.21]};
      entries.forEach(e=>{
        const cc=e.country||'US';
        const geo=CC_GEO[cc]||[0,0];
        all.push({id:'feodo_'+uid(),src:'FEODO',title:`C2 Server: ${e.ip_address||'?'}`,
          desc:`Malware: ${e.malware||'Unknown'} · Port: ${e.port||'?'} · Country: ${cc}`,
          lat:geo[0]+(Math.random()-.5)*4,lon:geo[1]+(Math.random()-.5)*4,type:'c2',

/* ══════════════════════════════════════════
   FETCH WINDY WEBCAMS
══════════════════════════════════════════ */
async function fetchWindyCams(){
  if(WINDY_KEY==='YOUR_WINDY_API_KEY'){
    log('warn','Windy key not set — using DOT cams only');
    return DOT_CAMS;
  }
  try{
    log('warn','Fetching Windy webcams…');
    // Windy Webcams API — fetch cams in visible viewport clusters
    const regions=[
      {lat:40,lon:-74,r:500},  // US East
      {lat:34,lon:-118,r:500}, // US West
      {lat:51,lon:0,r:600},    // Europe
      {lat:35,lon:139,r:400},  // Japan
      {lat:-33,lon:151,r:400}, // Australia
      {lat:22,lon:114,r:400},  // Hong Kong/China
    ];
    const all=[];
    await Promise.allSettled(regions.map(async r=>{
      const url=`https://api.windy.com/webcams/api/v3/webcams?lang=en&limit=50&offset=0&nearby=${r.lat},${r.lon},${r.r}&fields=webcamId,title,status,location,player`;
      const res=await fetch(url,{
        headers:{'x-windy-api-key':WINDY_KEY},
        signal:AbortSignal.timeout(12000),
      });
      if(!res.ok){log('fail',`Windy region ${r.lat}: HTTP ${res.status}`);return;}
      const json=await res.json();
      (json.webcams||[]).forEach(w=>{
        if(w.status!=='active')return;
        all.push({
          id:'windy_'+w.webcamId,
          name:w.title||'Webcam',
          lat:w.location?.latitude,
          lon:w.location?.longitude,
          city:w.location?.city||'',
          country:w.location?.country||'',
          src:'WINDY',
          embed:w.player?.day?.embed||'',
          thumb:w.player?.day?.preview||'',
        });
      });
    }));
    const result=[...DOT_CAMS,...all.filter(c=>c.lat&&c.lon)];
    log('ok',`Cameras: ${result.length} total (${DOT_CAMS.length} DOT + ${all.length} Windy)`);
    document.getElementById('ct-cameras').textContent=result.length;
    return result;
  }catch(e){
    log('fail','Windy: '+e.message+' — using DOT only');
    return DOT_CAMS;
  }
}

  document.getElementById('cam-overlay').classList.add('show');
}

/* ══════════════════════════════════════════

async function fetchAll(){
  setStatus('fetching');
  document.getElementById('lbar').style.display='block';
  log('warn','=== Starting full fetch ===');
  const[rssR,flightR,shipR,satR,quakeR,threatR,alertR,stormR,camR]=await Promise.allSettled([
    fetchRSS(),fetchFlights(),fetchShips(),fetchSatellites(),fetchQuakes(),fetchThreats(),fetchNOAAAlerts(),fetchNOAAStorms(),fetchWindyCams()
  ]);
  fetchNOAAConditions();

  const raw=rssR.status==='fulfilled'?rssR.value:[];
  const seen=new Set();
  allEvents=raw.filter(e=>{const k=e.headline.toLowerCase().slice(0,55);if(seen.has(k))return false;seen.add(k);return true;}).sort((a,b)=>b.ts-a.ts);
  liveFlights=flightR.status==='fulfilled'?flightR.value:[];
  liveShips=shipR.status==='fulfilled'?shipR.value:[];
  liveSats=satR.status==='fulfilled'?satR.value:[];
  quakes=quakeR.status==='fulfilled'?quakeR.value:[];
  threats=threatR.status==='fulfilled'?threatR.value:[];
  wxAlerts=alertR.status==='fulfilled'?alertR.value:[];
  storms=stormR.status==='fulfilled'?stormR.value:[];
  cameras=camR.status==='fulfilled'?camR.value:DOT_CAMS;
  document.getElementById('ct-cameras').textContent=cameras.length;

  document.getElementById('ct-news').textContent=allEvents.length;
  document.getElementById('ct-alerts').textContent=wxAlerts.length;
  document.getElementById('ct-storms').textContent=wxAlerts.length;
  // status in layer tooltip
  // updated timestamp removed from old status bar
  document.getElementById('lbar').style.display='none';
  log('ok',`Done — ${allEvents.length} news, ${liveFlights.length} flights, ${liveShips.length} ships, ${liveSats.length} sats, ${quakes.length} quakes, ${threats.length} threats`);
  setStatus(allEvents.length||liveFlights.length||liveSats.length?'live':'err');

  renderNewsMap();renderFlights();renderShips();renderSatellites();renderQuakes();renderThreats();renderZones();renderCameras();renderWeather();renderList();renderTicker();
}

/* ══════════════════════════════════════════
   RENDER — NEWS CLUSTERS
══════════════════════════════════════════ */
function renderNewsMap(){
  Object.values(newsEnts).forEach(e=>viewer.entities.remove(e));newsEnts={};
  vehicleEnts.forEach(e=>viewer.entities.remove(e));vehicleEnts=[];
  if(!layers.news)return;

  const visible=getFiltered();
  const groups={};
  visible.forEach(ev=>{
    if(!ev.geo)return;
    const key=`${Math.round(ev.geo.lat*2)/2},${Math.round(ev.geo.lon*2)/2}`;
    if(!groups[key])groups[key]=[];groups[key].push(ev);
  });

  Object.entries(groups).forEach(([key,evs])=>{
    const lead=evs.sort((a,b)=>b.sev-a.sev)[0];
    const col=SEV_COLOR[lead.cat]||'#00ff9d';
    const cc=Cesium.Color.fromCssColorString(col);
    const r=55000+lead.sev*28000+(evs.length-1)*12000;
    const sel=evs.some(e=>e.id===selectedId);
    newsEnts[key]=viewer.entities.add({
      id:key,_evIds:evs.map(e=>e.id),
      position:Cesium.Cartesian3.fromDegrees(lead.geo.lon,lead.geo.lat),
      ellipse:{semiMajorAxis:r,semiMinorAxis:r,material:cc.withAlpha(sel?.3:.12),
        outline:true,outlineColor:cc.withAlpha(sel?.9:.45),outlineWidth:sel?2:1,height:0},
      point:{pixelSize:4+lead.sev*.7,color:cc,outlineColor:Cesium.Color.BLACK.withAlpha(.6),
        outlineWidth:1,disableDepthTestDistance:Number.POSITIVE_INFINITY},
      label:{text:`${CAT_ICONS[lead.cat]||'📰'} ${lead.geo.name.toUpperCase()}\n${evs.length} stor${evs.length>1?'ies':'y'}`,
        font:'10px "Share Tech Mono"',fillColor:cc,outlineColor:Cesium.Color.BLACK,outlineWidth:2,
        style:Cesium.LabelStyle.FILL_AND_OUTLINE,pixelOffset:new Cesium.Cartesian2(0,-22),
        showBackground:true,backgroundColor:new Cesium.Color(.01,.03,.08,.88),
        backgroundPadding:new Cesium.Cartesian2(5,3),
        disableDepthTestDistance:Number.POSITIVE_INFINITY,show:sel||evs.length>=2||lead.sev>=7},
    });
  });

  visible.filter(e=>e.geo&&e.veh).sort((a,b)=>b.sev-a.sev).slice(0,50).forEach(ev=>{
    const v=ev.veh;
    const alt=v.icon==='✈️'?9000:v.icon==='🚁'?300:0;
    const jLat=ev.geo.lat+(Math.random()-.5)*1.2;
    const jLon=ev.geo.lon+(Math.random()-.5)*1.2;
    const ent=viewer.entities.add({
      id:'nv_'+ev.id,_evId:ev.id,
      position:Cesium.Cartesian3.fromDegrees(jLon,jLat,alt),
      billboard:{image:makePinCanvas(v.icon,v.color,ev.id===selectedId),
        width:30,height:30,verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,
        heightReference:alt>0?Cesium.HeightReference.NONE:Cesium.HeightReference.CLAMP_TO_GROUND},
      label:{text:v.label,font:'9px "Share Tech Mono"',fillColor:Cesium.Color.fromCssColorString(v.color),
        outlineColor:Cesium.Color.BLACK,outlineWidth:2,style:Cesium.LabelStyle.FILL_AND_OUTLINE,
        pixelOffset:new Cesium.Cartesian2(0,-33),showBackground:true,
        backgroundColor:new Cesium.Color(.01,.03,.08,.85),backgroundPadding:new Cesium.Cartesian2(4,2),
        disableDepthTestDistance:Number.POSITIVE_INFINITY,show:ev.id===selectedId},
    });
    vehicleEnts.push(ent);
  });
}

/* ══════════════════════════════════════════
   RENDER — SATELLITES + ORBITAL TRACKS
══════════════════════════════════════════ */
function renderSatellites(){
  satEnts.forEach(e=>viewer.entities.remove(e));satEnts=[];
  if(!layers.sats||!activeSrcs.has('CELESTRAK'))return;

  liveSats.forEach(s=>{
    const altM=(s.alt||400)*1000; // km to m

    // Satellite icon
    satEnts.push(viewer.entities.add({
      id:'sat_'+uid(),_sat:s,_isSat:true,
      position:Cesium.Cartesian3.fromDegrees(s.lon,s.lat,altM),
      billboard:{image:makePinCanvas('🛰️',s.color,false),
        width:20,height:20,verticalOrigin:Cesium.VerticalOrigin.CENTER,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,heightReference:Cesium.HeightReference.NONE},
    }));

    // Orbital track polyline
    const segs=getOrbitTrack(s.satrec,60,1.5);
    segs.forEach((seg,i)=>{
      if(seg.length<2)return;
      const positions=seg.map(p=>Cesium.Cartesian3.fromDegrees(p[1],p[0],altM));
      satEnts.push(viewer.entities.add({
        polyline:{
          positions,
          width:i===0?1.5:0.8,
          material:new Cesium.PolylineDashMaterialProperty({
            color:Cesium.Color.fromCssColorString(s.color).withAlpha(i===0?.6:.25),
            dashLength:12,
          }),
          clampToGround:false,
        },
      }));
    });
  });
}

/* ══════════════════════════════════════════
   RENDER LIST
══════════════════════════════════════════ */
function renderList(){
  const filtered=getFiltered();
  const list=document.getElementById('event-list');
  const empty=document.getElementById('empty');
  if(!filtered.length){
    list.innerHTML='';empty.style.display='block';
    empty.textContent=allEvents.length?`No results for "${searchQ||'current filters'}" — try adjusting filters.`:'⟳ Fetching feeds… open ▶ DEBUG LOG to see status.';
    return;
  }
  empty.style.display='none';
  const maxSev=Math.max(...filtered.map(e=>e.sev),1);
  list.innerHTML=filtered.slice(0,150).map(ev=>{
    const cls=ev.sev>=8?'threat':ev.sev>=6?'warn':'';
    const pct=Math.round((ev.sev/maxSev)*100);
    const sel=ev.id===selectedId?'sel':'';
    const date=new Date(ev.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const vStr=ev.veh?`<span title="${ev.veh.label}">${ev.veh.icon}</span>`:'';
    return`<div class="ev ${cls} ${sel}" onclick="selectEvent('${ev.id}')">
      <span class="ico">${CAT_ICONS[ev.cat]||'📰'}</span>
      <div class="body">
        <div class="headline">${esc(ev.headline)}</div>
        <div class="meta">
          <span class="src-tag" style="background:${ev.srcColor}20;border:1px solid ${ev.srcColor}44;color:${ev.srcColor}">${ev.src}</span>
          ${ev.geo?`<span class="loc">📍${ev.geo.name}</span>`:''}${vStr}
          <span class="age">${date}</span>
        </div>
      </div>
      <div class="sbar"><div class="sbar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function getFiltered(){
  const q=searchQ.toLowerCase().trim();
  const cut=Date.now()-dayRange*86400000;
  return allEvents.filter(ev=>{
    if(ev.ts<cut)return false;
    if(!activeSrcs.has(ev.src))return false;
    if(!activeCats.has(ev.cat))return false;
    if(q){const hay=(ev.headline+' '+(ev.geo?.name||'')+' '+ev.srcLabel+' '+ev.cat+' '+(ev.text||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}
function detectGeo(text){
  const lower=text.toLowerCase();
  const sorted=Object.entries(GEO).sort((a,b)=>b[0].length-a[0].length);
  for(const[name,c]of sorted){if(lower.includes(name))return{name,lat:c[0],lon:c[1]};}
  return null;
}
function detectCat(text){for(const[cat,rx]of Object.entries(CAT_RX)){if(rx.test(text))return cat;}return'general';}
function calcSev(text,cat){
  let s=3;
  if(cat==='conflict'||cat==='military')s+=3;
  if(cat==='naval'||cat==='aviation')s+=2;
  if(cat==='weather')s+=2;if(cat==='breaking')s+=2;
  if(/kill|dead|death|casualt|massacre|nuclear/i.test(text))s+=2;
  if(/hundreds|thousands|dozens/i.test(text))s+=1;
  return Math.min(s,10);
}
function makePinCanvas(icon,color,selected){
  const s=selected?36:26,c=document.createElement('canvas');
  c.width=s;c.height=s;
  const ctx=c.getContext('2d');
  ctx.beginPath();ctx.arc(s/2,s/2,s/2-1,0,Math.PI*2);
  ctx.fillStyle=selected?'rgba(255,255,255,.2)':'rgba(0,0,0,.65)';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=selected?2.5:1.5;ctx.stroke();
  ctx.font=`${Math.round(s*.44)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icon,s/2,s/2+1);return c;
}
function setStatus(s){
  const dot=document.getElementById('bar-dot');
  if(dot)dot.className=(s==='live'?'live':s==='fetching'?'fetching':'err');
}
function uid(){return Math.random().toString(36).slice(2,10);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══════════════════════════════════════════
   SELECT EVENT
══════════════════════════════════════════ */
function selectEvent(id){
  const ev=allEvents.find(e=>e.id===id);if(!ev)return;
  selectedId=id===selectedId?null:id;
  if(selectedId&&ev.geo){
    viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(ev.geo.lon,ev.geo.lat,2800000),duration:1.5});
    vehicleEnts.forEach(e=>{e.label.show=e._evId===id;});
  }
  if(selectedId&&ev.link){setTimeout(()=>{if(confirm(`Open article?\n\n${ev.headline}\n\n${ev.srcLabel}`))window.open(ev.link,'_blank');},500);}
  renderNewsMap();renderList();
}

/* ══════════════════════════════════════════
   TOGGLES
══════════════════════════════════════════ */
function toggleLayer(name){
  layers[name]=!layers[name];
  const btn=document.getElementById('lyr-'+name);
  btn.classList.toggle('off',!layers[name]);
  btn.classList.toggle('active',layers[name]);
  if(name==='news'){renderNewsMap();renderList();}
  else if(name==='flights')renderFlights();
  else if(name==='ships')renderShips();
  else if(name==='sats')renderSatellites();
  else if(name==='quakes')renderQuakes();
  else if(name==='threat')renderThreats();
  else if(name==='zones')renderZones();
  else if(name==='cameras')renderCameras();
  else renderWeather();
}
function toggleSrc(id){
  activeSrcs.has(id)?activeSrcs.delete(id):activeSrcs.add(id);
  document.querySelectorAll('.fsrc-btn').forEach(b=>b.classList.toggle('off',!activeSrcs.has(b.dataset.src)));
  renderNewsMap();renderFlights();renderShips();renderSatellites();renderQuakes();renderThreats();renderCameras();renderWeather();renderList();
}
function toggleCat(id){
  activeCats.has(id)?activeCats.delete(id):activeCats.add(id);
  document.querySelectorAll('.fcat-btn').forEach(b=>b.classList.toggle('off',!activeCats.has(b.dataset.cat)));
  renderNewsMap();renderList();
}

/* ══════════════════════════════════════════
   GLOBE HOVER + CLICK
══════════════════════════════════════════ */
const tip=document.getElementById('tooltip');
viewer.screenSpaceEventHandler.setInputAction(click=>{
  // Zone draw mode — place zone on click
  if(zoneDrawMode){
    const ray=viewer.camera.getPickRay(click.position);
    const pos=viewer.scene.globe.pick(ray,viewer.scene);
    if(pos){
      const carto=Cesium.Ellipsoid.WGS84.cartesianToCartographic(pos);
      const lat=Cesium.Math.toDegrees(carto.latitude);
      const lon=Cesium.Math.toDegrees(carto.longitude);
      addZone(lat,lon);
    }
    return;
  }
  const p=viewer.scene.pick(click.position);
  if(p?.id?._isCam){openCamera(p.id._cam);return;}
  if(p?.id?._evId)selectEvent(p.id._evId);
  else if(p?.id?._evIds?.length)selectEvent(allEvents.find(e=>e.id===p.id._evIds[0])?.id);
  else if(p?.id?._quake&&p.id._quake.url)window.open(p.id._quake.url,'_blank');
  else if(p?.id?._threat&&p.id._threat.link)window.open(p.id._threat.link,'_blank');
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

viewer.screenSpaceEventHandler.setInputAction(move=>{
  const p=viewer.scene.pick(move.endPosition);
  let html=null;
  if(p?.id?._isCam){
    const c=p.id._cam;
    html=`<strong>📹 ${c.name}</strong>${c.city?c.city+', ':''} ${c.country}<br><span style="color:#39ff14;font-size:9px">Click to open live feed · ${c.src}</span>`;
  }else if(p?.id?._isFlight){
    const f=p.id._flight;
    html=`<strong>✈️ ${f.callsign||f.icao}</strong>${f.country}<br>Alt: ${f.alt?f.alt+'ft':'–'} · ${f.speed||'–'} · Hdg: ${f.heading||'–'}`;
  }else if(p?.id?._isShip){
    const s=p.id._ship;
    html=`<strong>🚢 ${s.name}</strong>${s.flag}<br>Speed: ${s.speed||'–'} · Hdg: ${s.heading||'–'}<br>Dest: ${s.dest||'Unknown'}`;
  }else if(p?.id?._isSat){
    const s=p.id._sat;
    html=`<strong>🛰️ ${s.name}</strong>Group: ${s.group}<br>Alt: ${s.alt}km`;
  }else if(p?.id?._isQuake){
    const q=p.id._quake;
    html=`<strong>🌋 M${q.mag.toFixed(1)} Earthquake</strong>${esc(q.place)}<br>Depth: ${q.depth}km · ${q.time}`;
  }else if(p?.id?._isThreat){
    const t=p.id._threat;
    html=`<strong>☠️ ${t.src} ${t.type.toUpperCase()}</strong>${esc(t.title.slice(0,80))}<br><span style="color:#ff6666;font-size:9px">${esc(t.desc.slice(0,100))}</span>`;
  }else if(p?.id?._isZone){
    const z=p.id._zone;
    html=`<strong>⚠️ ${z.label}</strong>User-defined alert zone<br>Radius: ${(z.radius/1000).toFixed(0)}km`;
  }else if(p?.id?._isAlert){
    const a=p.id._alert;
    html=`<strong>⚠️ ${a.event}</strong>${a.area}<br>Severity: ${a.severity}`;
  }else if(p?.id?._isStorm){
    const s=p.id._storm;
    html=`<strong>🌀 ${s.title}</strong>${s.desc.slice(0,140)}`;
  }else if(p?.id?._evId){
    const ev=allEvents.find(e=>e.id===p.id._evId);
    if(ev)html=`<strong>${ev.veh?.icon||''} ${ev.veh?.label||'Event'}</strong><span style="color:${ev.srcColor}">[${ev.src}]</span> ${esc(ev.headline.slice(0,90))}${ev.geo?`<br>📍 ${ev.geo.name}`:''}`;
  }else if(p?.id?._evIds){
    const evs=allEvents.filter(e=>p.id._evIds.includes(e.id)).slice(0,5);
    if(evs.length)html=`<strong>📍 ${evs[0].geo?.name?.toUpperCase()||''} — ${evs.length} stories</strong>`+evs.map(e=>`<span style="color:${e.srcColor}">[${e.src}]</span> ${esc(e.headline.slice(0,55))}…`).join('<br>');
  }
  if(html){tip.innerHTML=html;tip.style.display='block';tip.style.left=(move.endPosition.x+14)+'px';tip.style.top=(move.endPosition.y-14)+'px';}
  else tip.style.display='none';
},Cesium.ScreenSpaceEventType.MOUSE_MOVE);

if(bc)bc.textContent=new Date().toUTCString().replace('GMT','UTC');

window.addEventListener('load',()=>{
  alertZones=loadZones();
  document.getElementById('ct-zones').textContent=alertZones.length;
  toggleDebug();
  fetchAll();
});
setInterval(fetchAll,10*60*1000);
setInterval(()=>{fetchFlights().then(f=>{liveFlights=f;renderFlights();renderTicker();});},60*1000);
setInterval(()=>{fetchShips().then(s=>{liveShips=s;renderShips();renderTicker();});},3*60*1000);
setInterval(()=>{fetchQuakes().then(q=>{quakes=q;renderQuakes();renderTicker();});},5*60*1000);
setInterval(updateSatPositions,30*1000);
setInterval(()=>{fetchSatellites().then(s=>{liveSats=s;renderSatellites();renderTicker();});},2*60*60*1000);
